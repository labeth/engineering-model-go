    - id: CV-COFFEE-DEVICE-IDENTITY-TEST
      controlRef: CTRL-COFFEE-DEVICE-IDENTITY
      threatScenarioRefs: [TS-COFFEE-OTA-COMMAND-SPOOF]
      riskRefs: [RISK-COFFEE-DEVICE-SPOOFING]
      method: test
      status: pass
      owner: ACT-SECURITY-ANALYST
      lastTested: 2026-04-13
      findings:
        - unauthorized command publishers rejected by identity policy
      evidence:
        - path: src/telemetry_ingest.ts
          description: Identity enforcement checks in ingress path.
    - id: CV-COFFEE-TELEMETRY-REPLAY
      controlRef: CTRL-COFFEE-DEVICE-IDENTITY
      threatScenarioRefs: [TS-COFFEE-TELEMETRY-REPLAY]
      riskRefs: [RISK-COFFEE-TELEMETRY-REPLAY]
      method: analysis
      status: partial
      owner: ACT-SECURITY-ANALYST
      lastTested: 2026-04-18
      findings:
        - replay detection works for standard windows; high-burst tuning still in progress
      evidence:
        - path: src/telemetry_ingest.ts
          description: Replay window logic and dedup analysis.
    - id: CV-COFFEE-AUDIT-INTEGRITY-ANALYSIS
      controlRef: CTRL-COFFEE-DEVICE-IDENTITY
      threatScenarioRefs: [TS-COFFEE-LOG-TAMPERING]
      riskRefs: [RISK-COFFEE-LOG-TAMPERING]
      method: inspection
      status: partial
      owner: ACT-SECURITY-ANALYST
      lastTested: 2026-04-20
      findings:
        - log write permissions are constrained but immutable retention still being expanded
      evidence:
        - path: docs/security/log-integrity-review.md
          description: Inspection notes for audit integrity controls.

  threatMitigations:
    - id: MIT-COFFEE-FW-SIGNATURE-VERIFY
      threatScenarioRef: TS-COFFEE-MALICIOUS-OTA-BUNDLE
      controlRef: CTRL-COFFEE-FIRMWARE-SIGNATURE
