model:
  id: sample-coffee-fleet-ota-cloud-model
  title: Connected Coffee Fleet OTA + Cloud Architecture
  introduction: |
    This document models connected coffee machines that send telemetry to a central cloud site,
    receive OTA firmware updates, and produce operational and audit logging evidence.
    Authored functional architecture remains stable while runtime, code, and verification layers
    are inferred from infrastructure, source, and test artifacts.
  baseCatalogRef: ./catalog.yml

authoredArchitecture:
  functionalGroups:
    - id: FG-MACHINE-EDGE
      name: Machine Edge
      description: Device-local telemetry and OTA execution responsibilities.
      prose: |
        Machine Edge owns behavior that executes directly on coffee machines.
        It gathers telemetry, applies OTA updates, and reports local status to cloud boundaries.
    - id: FG-CLOUD-CONTROL
      name: Cloud Control
      description: Central cloud ingestion, campaign control, and fleet reporting.
      prose: |
        Cloud Control owns central APIs and coordination logic for fleet telemetry and OTA rollouts.
        It provides global fleet visibility and deterministic rollout decisions.
    - id: FG-PLATFORM-OPERATIONS
      name: Platform Operations
      description: Cloud runtime operations plus identity and secret-management controls.
      prose: |
        Platform Operations owns deployability, runtime guardrails, and secure identity/config lifecycle.
        It ensures cloud and device trust boundaries remain enforceable over time.

  functionalUnits:
    - id: FU-MACHINE-TELEMETRY-COLLECTION
      name: Machine Telemetry Collection
      group: FG-MACHINE-EDGE
      prose: |
        Collects brew/device telemetry and transmits cloud-bound telemetry payloads.
    - id: FU-OTA-UPDATE-AGENT
      name: OTA Update Agent
      group: FG-MACHINE-EDGE
      prose: |
        Downloads signed firmware bundles, validates integrity, applies updates, and reports status.
    - id: FU-FLEET-INGESTION-API
      name: Fleet Ingestion API
      group: FG-CLOUD-CONTROL
      prose: |
        Receives telemetry and machine status, applies validation, and emits ingestion events.
    - id: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      name: Update Campaign Orchestration
      group: FG-CLOUD-CONTROL
      prose: |
        Plans OTA rollout cohorts, drives update commands, and handles rollback flow decisions.
    - id: FU-FLEET-OBSERVABILITY-REPORTING
      name: Fleet Observability Reporting
      group: FG-CLOUD-CONTROL
      prose: |
        Aggregates telemetry and OTA outcomes into dashboards, alerts, and audit records.
    - id: FU-CLOUD-RUNTIME-OPERATIONS
      name: Cloud Runtime Operations
      group: FG-PLATFORM-OPERATIONS
      prose: |
        Owns runtime deployment lifecycle, scaling controls, and runtime operational safety.
    - id: FU-DEVICE-IDENTITY-SECRETS
      name: Device Identity and Secrets
      group: FG-PLATFORM-OPERATIONS
      prose: |
        Manages device credentials, cloud tokens, and secure configuration used by edge/cloud units.

  actors:
    - id: ACT-BARISTA
      name: Barista
      description: Operates coffee machines and observes local device status.
    - id: ACT-FLEET-OPERATOR
      name: Fleet Operator
      description: Manages OTA campaigns and fleet-wide operational decisions.
    - id: ACT-PLATFORM-OPERATOR
      name: Platform Operator
      description: Operates cloud runtime, deployment, and reliability controls.
    - id: ACT-SECURITY-ANALYST
      name: Security Analyst
      description: Reviews firmware integrity, identity controls, and audit logging.

  attackVectors:
    - id: AV-MALICIOUS-FIRMWARE-BUNDLE
      name: Malicious Firmware Bundle
      description: Tampered OTA payload targeting update agent execution.
    - id: AV-SPOOFED-DEVICE-IDENTITY
      name: Spoofed Device Identity
      description: Unauthorized identity attempting telemetry/command access.
    - id: AV-TELEMETRY-REPLAY-ABUSE
      name: Telemetry Replay Abuse
      description: Replayed telemetry intended to overload ingestion and corrupt insights.
    - id: AV-LOG-TAMPERING
      name: Log Tampering
      description: Attempts to suppress or alter audit/operational logs.

  referencedElements:
    - id: REF-IOT-INGEST-ENDPOINT
      kind: external_service_endpoint
      layer: runtime
      name: IoT Ingest Endpoint
    - id: REF-FIRMWARE-BUNDLE-STORE
      kind: object_store
      layer: runtime
      name: Firmware Bundle Store
    - id: REF-CLOUD-LOGGING-SERVICE
      kind: platform_service
      layer: runtime
      name: Cloud Logging Service
    - id: REF-FIRMWARE-SIGNER-SERVICE
      kind: signing_service
      layer: runtime
      name: Firmware Signer Service
    - id: REF-MQTT-DEVICE-SDK
      kind: third_party_library
      layer: code
      name: MQTT Device SDK
    - id: REF-CLOUD-RUNTIME-SDK
      kind: third_party_library
      layer: code
      name: Cloud Runtime SDK

  interfaces:
    - id: IF-COFFEE-TELEMETRY-INGEST
      name: Telemetry Ingestion Interface
      protocol: mqtt
      endpoint: mqtt://ingest/topics/telemetry
      schemaRef: schemas/telemetry.json
      owner: FU-FLEET-INGESTION-API
    - id: IF-COFFEE-OTA-COMMAND
      name: OTA Command Interface
      protocol: mqtt
      endpoint: mqtt://devices/ota/commands
      schemaRef: schemas/ota-command.json
      owner: FU-UPDATE-CAMPAIGN-ORCHESTRATION

  dataObjects:
    - id: DO-COFFEE-TELEMETRY-EVENT
      name: Telemetry Event
      termRef: DATA-TELEMETRY-EVENT
      schemaRef: schemas/telemetry-event.json
      sensitivity: internal
      classification: operational-metrics
      regulatoryTags: [internal-operations]
      retention: 180_days
      confidentiality: medium
      integrity: high
      availability: high
    - id: DO-COFFEE-OTA-PLAN
      name: OTA Rollout Plan
      termRef: DATA-OTA-PLAN
      schemaRef: schemas/ota-plan.json
      sensitivity: internal
      classification: deployment-control
      regulatoryTags: [safety-control]
      retention: 365_days
      confidentiality: medium
      integrity: high
      availability: medium

  deploymentTargets:
    - id: DEP-COFFEE-CLOUD-PROD
      name: Coffee Cloud Production
      environment: prod
      region: us-east-1
      account: cloud
      cluster: coffee-cloud
      namespace: coffee
      trustZone: app
    - id: DEP-COFFEE-EDGE-FLEET
      name: Coffee Edge Fleet
      environment: edge
      region: global
      account: device
      cluster: edge-fleet
      namespace: devices
      trustZone: edge

  controls:
    - id: CTRL-COFFEE-DEVICE-IDENTITY
      name: Device Identity Validation
      category: identity-access
      description: Require authenticated device identity for telemetry and OTA command channels.
    - id: CTRL-COFFEE-FIRMWARE-SIGNATURE
      name: Firmware Signature Enforcement
      category: integrity
      description: Require signed firmware bundles before applying OTA updates.

  controlAllocations:
    - id: ALLOC-IA-3-DEVICE-IDENTITY
      controlRef: CTRL-COFFEE-DEVICE-IDENTITY
      oscalControlIds: [ia-3]
      appliesTo: [FU-FLEET-INGESTION-API, FU-DEVICE-IDENTITY-SECRETS, IF-COFFEE-TELEMETRY-INGEST]
      implementationType: technical
      status: implemented
      narrative: Telemetry channels enforce device identity verification and reject unauthorized clients.
      evidence:
        - path: src/telemetry_ingest.ts
      responsibleRoles: [ACT-SECURITY-ANALYST]
    - id: ALLOC-SI-7-FW-SIGNATURE
      controlRef: CTRL-COFFEE-FIRMWARE-SIGNATURE
      oscalControlIds: [si-7]
      appliesTo: [FU-OTA-UPDATE-AGENT, FU-UPDATE-CAMPAIGN-ORCHESTRATION]
      implementationType: hybrid
      status: implemented
      narrative: OTA workflows require signer verification before rollout and device application.
      evidence:
        - path: src/ota_agent.rs
      responsibleRoles: [ACT-FLEET-OPERATOR]

  trustBoundaries:
    - id: TB-COFFEE-EDGE-DEVICE
      name: Edge Device Boundary
      description: Boundary between managed edge devices and cloud control plane.
      boundaryType: device-network
      members: [FU-OTA-UPDATE-AGENT, FU-MACHINE-TELEMETRY-COLLECTION, DEP-COFFEE-EDGE-FLEET]
    - id: TB-COFFEE-CLOUD-CONTROL
      name: Cloud Control Boundary
      description: Boundary between cloud app workloads and privileged platform controls.
      boundaryType: control-plane
      members: [FU-CLOUD-RUNTIME-OPERATIONS, FU-DEVICE-IDENTITY-SECRETS, DEP-COFFEE-CLOUD-PROD]

  states:
    - id: STATE-COFFEE-OTA-SCHEDULED
      name: OTA Scheduled
      description: Campaign prepared and waiting for rollout execution.
    - id: STATE-COFFEE-OTA-APPLIED
      name: OTA Applied
      description: Firmware update successfully applied to target cohort.

  events:
    - id: EVT-COFFEE-OTA-REQUESTED
      name: OTA Requested
      description: OTA campaign request accepted.
    - id: EVT-COFFEE-OTA-COMPLETED
      name: OTA Completed
      description: OTA rollout completed for cohort.

  flows:
    - id: FLOW-COFFEE-OTA-ROLLOUT
      title: OTA Rollout Interaction Flow
      kind: security
      methodology: owasp-tm
      direction: outbound
      frequency: scheduled
      sourceRef: ACT-FLEET-OPERATOR
      destinationRef: FU-OTA-UPDATE-AGENT
      protocol: mqtt
      channel: ota-command
      authentication: device-mtls
      encryptionInTransit: tls1.3
      integrityProtection: firmware-signature
      dataRefs: [DO-COFFEE-OTA-PLAN]
      description: OTA campaign command path from operator scheduling through edge execution and reporting.
      entry: [operator-schedules-rollout]
      exits: [report-outcome]
      threats: [TS-COFFEE-MALICIOUS-OTA-BUNDLE, TS-COFFEE-OTA-COMMAND-SPOOF]
      steps:
        - id: operator-schedules-rollout
          kind: user_action
          flowType: control
          direction: inbound
          frequency: scheduled
          sourceRef: ACT-FLEET-OPERATOR
          destinationRef: FU-UPDATE-CAMPAIGN-ORCHESTRATION
          ref: ACT-FLEET-OPERATOR
          action: Fleet operator schedules OTA campaign
          next: [plan-campaign]
        - id: plan-campaign
          kind: system_action
          flowType: control
          direction: internal
          frequency: scheduled
          sourceRef: FU-UPDATE-CAMPAIGN-ORCHESTRATION
          destinationRef: DO-COFFEE-OTA-PLAN
          ref: FU-UPDATE-CAMPAIGN-ORCHESTRATION
          action: Build rollout cohorts and policy checks
          dataOut: [ota_rollout_plan]
          dataRefs: [DO-COFFEE-OTA-PLAN]
          next: [execute-update]
        - id: execute-update
          kind: system_action
          flowType: security
          direction: outbound
          frequency: scheduled
          sourceRef: FU-UPDATE-CAMPAIGN-ORCHESTRATION
          destinationRef: FU-OTA-UPDATE-AGENT
          ref: FU-OTA-UPDATE-AGENT
          action: Execute signed OTA update on edge devices
          dataIn: [ota_rollout_plan]
          dataRefs: [DO-COFFEE-OTA-PLAN]
          interfaceRef: IF-COFFEE-OTA-COMMAND
          trustBoundaryRef: TB-COFFEE-EDGE-DEVICE
          boundaryCrossing: true
          authentication: device-mtls
          encryptionInTransit: tls1.3
          integrityProtection: signature-verification
          async: true
          onError: [report-outcome]
          next: [report-outcome]
        - id: report-outcome
          kind: system_action
          flowType: notification
          direction: inbound
          frequency: scheduled
          sourceRef: FU-OTA-UPDATE-AGENT
          destinationRef: FU-FLEET-OBSERVABILITY-REPORTING
          ref: FU-FLEET-OBSERVABILITY-REPORTING
          action: Emit rollout status and observability summary
          dataRefs: [DO-COFFEE-OTA-PLAN]
    - id: FLOW-COFFEE-TELEMETRY-INGEST
      title: Telemetry Ingestion Interaction Flow
      kind: data
      methodology: owasp-tm
      direction: inbound
      frequency: realtime
      sourceRef: FU-MACHINE-TELEMETRY-COLLECTION
      destinationRef: FU-FLEET-INGESTION-API
      protocol: mqtt
      channel: telemetry
      authentication: device-identity-token
      encryptionInTransit: tls1.3
      integrityProtection: signed-telemetry-envelope
      dataRefs: [DO-COFFEE-TELEMETRY-EVENT]
      description: Telemetry path from device event collection to cloud ingest and reporting.
      entry: [capture-machine-telemetry]
      exits: [publish-fleet-observability]
      threats: [TS-COFFEE-TELEMETRY-REPLAY, TS-COFFEE-LOG-TAMPERING]
      steps:
        - id: capture-machine-telemetry
          kind: user_action
          flowType: interaction
          direction: internal
          frequency: realtime
          sourceRef: ACT-BARISTA
          destinationRef: FU-MACHINE-TELEMETRY-COLLECTION
          ref: ACT-BARISTA
          action: Barista machine activity produces telemetry events
          next: [collect-and-send-telemetry]
        - id: collect-and-send-telemetry
          kind: system_action
          flowType: data
          direction: outbound
          frequency: realtime
          sourceRef: FU-MACHINE-TELEMETRY-COLLECTION
          destinationRef: IF-COFFEE-TELEMETRY-INGEST
          ref: FU-MACHINE-TELEMETRY-COLLECTION
          action: Collect and send telemetry payloads to cloud ingest
          dataOut: [telemetry_event]
          dataRefs: [DO-COFFEE-TELEMETRY-EVENT]
          interfaceRef: IF-COFFEE-TELEMETRY-INGEST
          trustBoundaryRef: TB-COFFEE-EDGE-DEVICE
          boundaryCrossing: true
          authentication: device-identity-token
          encryptionInTransit: tls1.3
          integrityProtection: signed-telemetry-envelope
          next: [ingest-telemetry]
        - id: ingest-telemetry
          kind: system_action
          flowType: security
          direction: inbound
          frequency: realtime
          sourceRef: IF-COFFEE-TELEMETRY-INGEST
          destinationRef: FU-FLEET-INGESTION-API
          ref: FU-FLEET-INGESTION-API
          action: Validate and ingest telemetry records
          dataIn: [telemetry_event]
          dataRefs: [DO-COFFEE-TELEMETRY-EVENT]
          authentication: device-identity-validation
          integrityProtection: replay-window-check
          next: [publish-fleet-observability]
        - id: publish-fleet-observability
          kind: system_action
          flowType: notification
          direction: internal
          frequency: realtime
          sourceRef: FU-FLEET-INGESTION-API
          destinationRef: FU-FLEET-OBSERVABILITY-REPORTING
          ref: FU-FLEET-OBSERVABILITY-REPORTING
          action: Publish fleet observability and audit summaries
          dataIn: [telemetry_event]
          dataRefs: [DO-COFFEE-TELEMETRY-EVENT]

  threatAssumptions:
    - id: ASM-COFFEE-DEVICE-ROOT-OF-TRUST
      title: Device trust anchors are provisioned securely
      statement: Device trust anchors and certificates are provisioned via controlled manufacturing and onboarding process.
      status: accepted
      owner: ACT-SECURITY-ANALYST
      appliesTo: [FU-DEVICE-IDENTITY-SECRETS, FU-OTA-UPDATE-AGENT, TB-COFFEE-EDGE-DEVICE]
      rationale: Secure provisioning path is audited by platform security and manufacturing controls.
      evidence:
        - path: docs/security/device-provisioning-trust.md
          description: Provisioning trust and key-injection process.

  threatOutOfScope:
    - id: OOS-COFFEE-HARDWARE-PHYSICAL-TAMPER
      title: Physical tamper resistance of device enclosure
      reason: Hardware anti-tamper sensor design and physical sealing are owned by hardware product teams.
      status: approved
      owner: ACT-SECURITY-ANALYST
      appliesTo: [DEP-COFFEE-EDGE-FLEET]
      expiresOn: 2027-12-31
      evidence:
        - path: docs/security/hardware-shared-responsibility.md
          description: Hardware vs cloud security shared ownership statement.

  threatScenarios:
    - id: TS-COFFEE-MALICIOUS-OTA-BUNDLE
      title: Tampered firmware bundle executes on edge fleet
      summary: Attacker attempts to deliver malicious firmware by replacing or tampering rollout artifact.
      category: supply-chain
      stride: tampering
      cwe: [CWE-353]
      attackVectorRef: AV-MALICIOUS-FIRMWARE-BUNDLE
      appliesTo: [FU-OTA-UPDATE-AGENT, FU-UPDATE-CAMPAIGN-ORCHESTRATION, REF-FIRMWARE-BUNDLE-STORE]
      flowRefs: [FLOW-COFFEE-OTA-ROLLOUT]
      entryPoint: IF-COFFEE-OTA-COMMAND
      preconditions: [signature-check-bypass, compromised-artifact-store]
      exploitPath: [plan-campaign, execute-update]
      likelihood: medium
      impact: high
      severity: high
      status: mitigating
      owner: ACT-SECURITY-ANALYST
      riskRef: RISK-COFFEE-MALICIOUS-OTA
      relatedControls: [CTRL-COFFEE-FIRMWARE-SIGNATURE]
      assumptionRefs: [ASM-COFFEE-DEVICE-ROOT-OF-TRUST]
      outOfScopeRefs: [OOS-COFFEE-HARDWARE-PHYSICAL-TAMPER]
      mitigationRefs: [MIT-COFFEE-FW-SIGNATURE-VERIFY]
      verificationRefs: [CV-COFFEE-FW-SIGNATURE-TEST]
      detection: [signature-failure-rate, firmware-hash-mismatch]
      evidence:
        - path: src/ota_agent.rs
          description: Firmware signature verification path.
    - id: TS-COFFEE-OTA-COMMAND-SPOOF
      title: Spoofed OTA command triggers unauthorized rollout
      summary: Unauthorized sender attempts to push OTA command messages to device fleet topic.
      category: command-abuse
      stride: spoofing
      cwe: [CWE-287]
      attackVectorRef: AV-SPOOFED-DEVICE-IDENTITY
      appliesTo: [FU-UPDATE-CAMPAIGN-ORCHESTRATION, IF-COFFEE-OTA-COMMAND, FU-OTA-UPDATE-AGENT]
      flowRefs: [FLOW-COFFEE-OTA-ROLLOUT]
      entryPoint: IF-COFFEE-OTA-COMMAND
      preconditions: [identity-validation-gap]
      exploitPath: [operator-schedules-rollout, execute-update]
      likelihood: medium
      impact: high
      severity: high
      status: mitigating
      owner: ACT-SECURITY-ANALYST
      riskRef: RISK-COFFEE-DEVICE-SPOOFING
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      mitigationRefs: [MIT-COFFEE-DEVICE-IDENTITY-ENFORCEMENT]
      verificationRefs: [CV-COFFEE-DEVICE-IDENTITY-TEST]
      detection: [unauthorized-topic-publish, certificate-anomaly]
      evidence:
        - path: src/ota_agent.rs
          description: OTA command identity validation.
    - id: TS-COFFEE-TELEMETRY-REPLAY
      title: Telemetry replay inflates ingest and distorts reporting
      summary: Replayed telemetry bursts attempt to pollute fleet metrics and trigger false alerts.
      category: data-abuse
      stride: replay
      cwe: [CWE-294]
      attackVectorRef: AV-TELEMETRY-REPLAY-ABUSE
      appliesTo: [FU-FLEET-INGESTION-API, DO-COFFEE-TELEMETRY-EVENT, FU-FLEET-OBSERVABILITY-REPORTING]
      flowRefs: [FLOW-COFFEE-TELEMETRY-INGEST]
      entryPoint: IF-COFFEE-TELEMETRY-INGEST
      preconditions: [weak-replay-window, duplicate-id-acceptance]
      exploitPath: [collect-and-send-telemetry, ingest-telemetry, publish-fleet-observability]
      likelihood: medium
      impact: medium
      severity: medium
      status: mitigating
      owner: ACT-SECURITY-ANALYST
      riskRef: RISK-COFFEE-TELEMETRY-REPLAY
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      mitigationRefs: [MIT-COFFEE-TELEMETRY-REPLAY-WINDOW]
      verificationRefs: [CV-COFFEE-TELEMETRY-REPLAY]
      detection: [duplicate-event-id-alert, ingest-rate-anomaly]
      evidence:
        - path: src/telemetry_ingest.ts
          description: Replay window and dedup logic.
    - id: TS-COFFEE-LOG-TAMPERING
      title: Audit log tampering suppresses OTA incident visibility
      summary: Adversary attempts to alter or suppress security-relevant logs to hide malicious behavior.
      category: observability-abuse
      stride: repudiation
      cwe: [CWE-778]
      attackVectorRef: AV-LOG-TAMPERING
      appliesTo: [FU-FLEET-OBSERVABILITY-REPORTING, REF-CLOUD-LOGGING-SERVICE]
      flowRefs: [FLOW-COFFEE-TELEMETRY-INGEST, FLOW-COFFEE-OTA-ROLLOUT]
      entryPoint: FU-FLEET-OBSERVABILITY-REPORTING
      preconditions: [insufficient-log-immutability]
      exploitPath: [report-outcome, publish-fleet-observability]
      likelihood: low
      impact: high
      severity: medium
      status: identified
      owner: ACT-SECURITY-ANALYST
      riskRef: RISK-COFFEE-LOG-TAMPERING
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      mitigationRefs: [MIT-COFFEE-AUDIT-IMMUTABILITY]
      verificationRefs: [CV-COFFEE-AUDIT-INTEGRITY-ANALYSIS]
      detection: [audit-gap-alert, log-write-authz-failure]
      evidence:
        - path: docs/security/log-integrity-review.md
          description: Audit integrity assessment notes.

  mappings:
    - type: contains
      from: FG-MACHINE-EDGE
      to: FU-MACHINE-TELEMETRY-COLLECTION
    - type: contains
      from: FG-MACHINE-EDGE
      to: FU-OTA-UPDATE-AGENT
    - type: contains
      from: FG-CLOUD-CONTROL
      to: FU-FLEET-INGESTION-API
    - type: contains
      from: FG-CLOUD-CONTROL
      to: FU-UPDATE-CAMPAIGN-ORCHESTRATION
    - type: contains
      from: FG-CLOUD-CONTROL
      to: FU-FLEET-OBSERVABILITY-REPORTING
    - type: contains
      from: FG-PLATFORM-OPERATIONS
      to: FU-CLOUD-RUNTIME-OPERATIONS
    - type: contains
      from: FG-PLATFORM-OPERATIONS
      to: FU-DEVICE-IDENTITY-SECRETS

    - type: interacts_with
      from: ACT-BARISTA
      to: FU-MACHINE-TELEMETRY-COLLECTION
      description: Daily machine operation produces brew and status telemetry.
    - type: interacts_with
      from: ACT-FLEET-OPERATOR
      to: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      description: Defines OTA target cohorts and rollout windows.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-CLOUD-RUNTIME-OPERATIONS
      description: Operates deployment and runtime controls.
    - type: interacts_with
      from: ACT-SECURITY-ANALYST
      to: FU-DEVICE-IDENTITY-SECRETS
      description: Audits identity trust and secret rotation controls.

    - type: depends_on
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: REF-IOT-INGEST-ENDPOINT
      description: Publishes telemetry payloads to cloud ingestion.
    - type: calls
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: IF-COFFEE-TELEMETRY-INGEST
      description: Sends telemetry payloads via telemetry ingest interface.
    - type: writes
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: DO-COFFEE-TELEMETRY-EVENT
      description: Writes normalized telemetry event payload.
    - type: depends_on
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: FU-FLEET-INGESTION-API
      description: Sends normalized telemetry records to ingestion API.
    - type: depends_on
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: REF-MQTT-DEVICE-SDK
      description: Uses MQTT client for edge publish and command channels.
    - type: depends_on
      from: FU-MACHINE-TELEMETRY-COLLECTION
      to: FU-DEVICE-IDENTITY-SECRETS
      description: Uses machine identity material for authenticated publish.

    - type: depends_on
      from: FU-OTA-UPDATE-AGENT
      to: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      description: Receives OTA rollout commands and policy constraints.
    - type: calls
      from: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      to: IF-COFFEE-OTA-COMMAND
      description: Publishes OTA rollout commands to device fleet.
    - type: writes
      from: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      to: DO-COFFEE-OTA-PLAN
      description: Persists rollout plan and cohort metadata.
    - type: reads
      from: FU-OTA-UPDATE-AGENT
      to: DO-COFFEE-OTA-PLAN
      description: Reads rollout plan before applying firmware.
    - type: depends_on
      from: FU-OTA-UPDATE-AGENT
      to: REF-FIRMWARE-BUNDLE-STORE
      description: Downloads signed firmware bundle.
    - type: depends_on
      from: FU-OTA-UPDATE-AGENT
      to: FU-DEVICE-IDENTITY-SECRETS
      description: Uses trust anchors for firmware and endpoint authentication.

    - type: depends_on
      from: FU-FLEET-INGESTION-API
      to: FU-FLEET-OBSERVABILITY-REPORTING
      description: Forwards validated telemetry and machine status events.
    - type: depends_on
      from: FU-FLEET-INGESTION-API
      to: FU-DEVICE-IDENTITY-SECRETS
      description: Validates device identity and token claims.
    - type: depends_on
      from: FU-FLEET-INGESTION-API
      to: REF-CLOUD-RUNTIME-SDK
      description: Uses cloud SDK clients for ingest and routing operations.

    - type: depends_on
      from: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      to: REF-FIRMWARE-SIGNER-SERVICE
      description: Verifies firmware artifact signature metadata.
    - type: depends_on
      from: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      to: FU-FLEET-OBSERVABILITY-REPORTING
      description: Emits OTA rollout and rollback events for fleet visibility.
    - type: depends_on
      from: FU-UPDATE-CAMPAIGN-ORCHESTRATION
      to: FU-DEVICE-IDENTITY-SECRETS
      description: Uses trusted control-plane credentials.

