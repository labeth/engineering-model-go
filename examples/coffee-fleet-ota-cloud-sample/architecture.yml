  risks:
    - id: RISK-COFFEE-DEVICE-SPOOFING
      title: Device identity spoofing risk
      statement: Spoofed devices may inject telemetry and OTA requests without strong identity controls.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-SECURITY-ANALYST
      appliesTo: [FU-FLEET-INGESTION-API, IF-COFFEE-TELEMETRY-INGEST]
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      attackVectors: [AV-SPOOFED-DEVICE-IDENTITY]
      threatScenarios: [TS-COFFEE-OTA-COMMAND-SPOOF]
      evidence:
        - path: src/telemetry_ingest.ts
      residualRisk: medium
      rationale: Identity validation is active; replay hardening remains under review.
    - id: RISK-COFFEE-MALICIOUS-OTA
      title: Malicious OTA payload execution risk
      statement: Tampered firmware artifacts could execute on fleet devices if signature enforcement drifts.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-SECURITY-ANALYST
      appliesTo: [FU-OTA-UPDATE-AGENT, FU-UPDATE-CAMPAIGN-ORCHESTRATION]
      relatedControls: [CTRL-COFFEE-FIRMWARE-SIGNATURE]
      attackVectors: [AV-MALICIOUS-FIRMWARE-BUNDLE]
      threatScenarios: [TS-COFFEE-MALICIOUS-OTA-BUNDLE]
      evidence:
        - path: src/ota_agent.rs
          description: Signature verification flow in OTA agent.
      residualRisk: low
      rationale: Verification and signer controls are strong with regular regression checks.
    - id: RISK-COFFEE-TELEMETRY-REPLAY
      title: Telemetry replay distortion risk
      statement: Replayed telemetry can distort observability and trigger noisy operational decisions.
      status: mitigating
      likelihood: medium
      impact: medium
      response: mitigate
      owner: ACT-SECURITY-ANALYST
      appliesTo: [FU-FLEET-INGESTION-API, DO-COFFEE-TELEMETRY-EVENT]
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      attackVectors: [AV-TELEMETRY-REPLAY-ABUSE]
      threatScenarios: [TS-COFFEE-TELEMETRY-REPLAY]
      evidence:
        - path: src/telemetry_ingest.ts
          description: Replay-window filtering and dedup checks.
      residualRisk: medium
      rationale: Replay controls are present but require aggressive tuning under burst traffic.
    - id: RISK-COFFEE-LOG-TAMPERING
      title: Audit log tampering risk
      statement: Log tampering could conceal OTA incident traces and delay response.
      status: open
      likelihood: low
      impact: high
      response: mitigate
      owner: ACT-SECURITY-ANALYST
      appliesTo: [FU-FLEET-OBSERVABILITY-REPORTING, REF-CLOUD-LOGGING-SERVICE]
      relatedControls: [CTRL-COFFEE-DEVICE-IDENTITY]
      attackVectors: [AV-LOG-TAMPERING]
      threatScenarios: [TS-COFFEE-LOG-TAMPERING]
      evidence:
        - path: docs/security/log-integrity-review.md
          description: Current audit immutability gap analysis.
      residualRisk: medium
      rationale: Core logging exists; immutability hardening is incomplete.

  controlVerifications:
    - id: CV-COFFEE-FW-SIGNATURE-TEST
      controlRef: CTRL-COFFEE-FIRMWARE-SIGNATURE
      threatScenarioRefs: [TS-COFFEE-MALICIOUS-OTA-BUNDLE]
      riskRefs: [RISK-COFFEE-MALICIOUS-OTA]
