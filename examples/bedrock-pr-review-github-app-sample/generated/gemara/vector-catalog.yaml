  - all-environments
- id: AV-PROMPT-INJECTION-IN-DIFF
  title: Prompt Injection in Diff
  description: Malicious prompt-like content embedded in pull request diffs.
  group: attack-vector
  applicability:
  - all-environments
- id: AV-SECRET-LEAKAGE-IN-REVIEW
  title: Secret Leakage in Review Output
  description: Generated findings accidentally exposing secrets/tokens in comments.
  group: attack-vector
  applicability:
  - all-environments
- id: AV-PR-SPAM-ABUSE
  title: Pull Request Spam Abuse
  description: High-rate PR event flooding that can exhaust review capacity.
  group: attack-vector
  applicability:
  - all-environments
