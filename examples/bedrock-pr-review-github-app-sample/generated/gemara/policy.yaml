    risk:
      reference-id: ENGMOD-RISK-CATALOG
      entry-id: RISK-BEDROCK-SECRET-LEAKAGE
adherence:
  evaluation-methods:
  - id: EM-INTENT
    type: Intent
    mode: Automated
    required: true
    description: Static analysis of code, configuration, and test evidence.
  - id: EM-BEHAVIORAL
    type: Behavioral
    mode: Manual
    required: false
    description: Exercise and review of runtime behavior.
  assessment-plans:
  - id: AP-CV-BEDROCK-WEBHOOK-SIGNATURE
    requirement-id: CV-BEDROCK-WEBHOOK-SIGNATURE
    frequency: continuous
    evaluation-methods:
    - id: EM-INTENT
      type: Intent
      mode: Automated
      required: true
    evidence-requirements: Verification evidence linked to the control.
  - id: AP-CV-BEDROCK-PROMPT-INJECTION-RESILIENCE
    requirement-id: CV-BEDROCK-PROMPT-INJECTION-RESILIENCE
    frequency: continuous
    evaluation-methods:
    - id: EM-INTENT
      type: Intent
      mode: Automated
      required: true
    evidence-requirements: Verification evidence linked to the control.
  - id: AP-CV-BEDROCK-REDACTION-CHECK
    requirement-id: CV-BEDROCK-REDACTION-CHECK
    frequency: continuous
    evaluation-methods:
    - id: EM-INTENT
      type: Intent
      mode: Automated
      required: true
    evidence-requirements: Verification evidence linked to the control.
  enforcement-methods:
  - id: ENM-GATE
    type: Gate
    mode: Automated
    required: true
    description: Preventive change-control gate.
  - id: ENM-REMEDIATION
    type: Remediation
    mode: Manual
    required: false
    description: Remediation tracked via POA&M.
  non-compliance: Non-compliant findings are tracked as POA&M items with an owner and due date; unresolved high-severity findings block release.
