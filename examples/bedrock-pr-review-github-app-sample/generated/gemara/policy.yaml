risks:
  mitigated:
  - id: MIT-RISK-BEDROCK-WEBHOOK-SPOOFING
    risk:
      reference-id: ENGMOD-RISK-CATALOG
      entry-id: RISK-BEDROCK-WEBHOOK-SPOOFING
  - id: MIT-RISK-BEDROCK-PROMPT-INJECTION
    risk:
      reference-id: ENGMOD-RISK-CATALOG
      entry-id: RISK-BEDROCK-PROMPT-INJECTION
