model:
  id: sample-bedrock-pr-review-model
  title: Bedrock Lambda GitHub PR Review App Architecture
  introduction: |
    This document describes a GitHub App that reviews pull requests using AWS Bedrock and Lambda.
    The authored functional architecture remains stable while deployment/runtime/code evidence is inferred
    from infrastructure manifests, source files, and verification artifacts.
  baseCatalogRef: ./catalog.yml

authoredArchitecture:
  functionalGroups:
    - id: FG-PR-INTEGRATION
      name: PR Integration
      description: Ingress and context assembly for GitHub pull request events.
      prose: |
        PR Integration owns webhook trust boundaries and pull request context intake.
        It converts incoming GitHub events into normalized review work with clear boundaries.
    - id: FG-REVIEW-INTELLIGENCE
      name: Review Intelligence
      description: AI and deterministic review analysis with result publication.
      prose: |
        Review Intelligence owns generated findings, deterministic checks, and final publication behavior.
        It combines Bedrock reasoning with predictable policy checks and emits auditable review outputs.
    - id: FG-PLATFORM-OPERATIONS
      name: Platform Operations
      description: Lambda deployment lifecycle, runtime operations, and secrets/configuration.
      prose: |
        Platform Operations owns safe deployment, runtime controls, and secret/config lifecycle for the app.
        It enables dependable review operation without owning business-level review policy semantics.

  functionalUnits:
    - id: FU-GITHUB-WEBHOOK-INGRESS
      name: GitHub Webhook Ingress
      group: FG-PR-INTEGRATION
      prose: |
        Verifies webhook signatures, validates event type, and starts review workflow routing.
    - id: FU-PR-CONTEXT-ASSEMBLY
      name: PR Context Assembly
      group: FG-PR-INTEGRATION
      prose: |
        Fetches changed files and diff metadata and prepares bounded review context payloads.
    - id: FU-REVIEW-ORCHESTRATION
      name: Review Orchestration
      group: FG-REVIEW-INTELLIGENCE
      prose: |
        Calls Bedrock models, merges AI and deterministic findings, and handles graceful degradation paths.
    - id: FU-POLICY-CHECKS
      name: Policy Checks
      group: FG-REVIEW-INTELLIGENCE
      prose: |
        Runs deterministic checks for secrets, risky IaC changes, and repository policy constraints.
    - id: FU-REVIEW-PUBLICATION
      name: Review Publication
      group: FG-REVIEW-INTELLIGENCE
      prose: |
        Publishes check-run summaries and inline comments back to GitHub pull requests.
    - id: FU-LAMBDA-RUNTIME-OPERATIONS
      name: Lambda Runtime Operations
      group: FG-PLATFORM-OPERATIONS
      prose: |
        Manages Lambda packaging/deployment lifecycle and operational health guardrails.
    - id: FU-SECRETS-CONFIGURATION
      name: Secrets and Configuration
      group: FG-PLATFORM-OPERATIONS
      prose: |
        Manages GitHub App credentials, Bedrock config, and redaction-safe runtime configuration.

  actors:
    - id: ACT-DEVELOPER
      name: Developer
      description: Opens pull requests and receives review feedback.
    - id: ACT-SECURITY-ENGINEER
      name: Security Engineer
      description: Curates policy checks and triages security findings.
    - id: ACT-PLATFORM-OPERATOR
      name: Platform Operator
      description: Operates Lambda deployment and runtime controls.
    - id: ACT-REPOSITORY-MAINTAINER
      name: Repository Maintainer
      description: Owns merge decisions and repository-level quality gates.

  attackVectors:
    - id: AV-SPOOFED-GITHUB-WEBHOOK
      name: Spoofed GitHub Webhook
      description: Forged webhook payload attempting unauthorized review execution.
    - id: AV-PROMPT-INJECTION-IN-DIFF
      name: Prompt Injection in Diff
      description: Malicious prompt-like content embedded in pull request diffs.
    - id: AV-SECRET-LEAKAGE-IN-REVIEW
      name: Secret Leakage in Review Output
      description: Generated findings accidentally exposing secrets/tokens in comments.
    - id: AV-PR-SPAM-ABUSE
      name: Pull Request Spam Abuse
      description: High-rate PR event flooding that can exhaust review capacity.

  referencedElements:
    - id: REF-GITHUB-APP-API
      kind: external_service_endpoint
      layer: runtime
      name: GitHub App API
    - id: REF-AWS-BEDROCK-RUNTIME
      kind: external_service_endpoint
      layer: runtime
      name: AWS Bedrock Runtime API
    - id: REF-AWS-SECRETS-MANAGER
      kind: platform_service
      layer: runtime
      name: AWS Secrets Manager
    - id: REF-GITHUB-REST-SDK
      kind: third_party_library
      layer: code
      name: GitHub REST SDK
    - id: REF-AWS-SDK-GO
      kind: third_party_library
      layer: code
      name: AWS SDK for Go
    - id: REF-POLICY-RULESET
      kind: policy_bundle
      layer: code
      name: Review Policy Ruleset

  interfaces:
    - id: IF-BEDROCK-WEBHOOK-API
      name: Webhook Intake API
      protocol: https
      endpoint: /webhook/github
      schemaRef: schemas/webhook-event.json
      owner: FU-GITHUB-WEBHOOK-INGRESS
    - id: IF-BEDROCK-REVIEW-PUBLISH-API
      name: Review Publish API
      protocol: https
      endpoint: /github/check-runs
      schemaRef: schemas/review-output.json
      owner: FU-REVIEW-PUBLICATION

  dataObjects:
    - id: DO-BEDROCK-PR-CONTEXT
      name: Pull Request Context
      termRef: DATA-PR-CONTEXT
      schemaRef: schemas/pr-context.json
      sensitivity: internal
    - id: DO-BEDROCK-REVIEW-FINDINGS
      name: Review Findings
      termRef: DATA-REVIEW-FINDINGS
      schemaRef: schemas/review-findings.json
      sensitivity: internal

  deploymentTargets:
    - id: DEP-BEDROCK-LAMBDA-PRIMARY
      name: Primary Lambda Runtime
      environment: prod
      region: us-east-1
      account: app
      cluster: lambda
      namespace: review
      trustZone: app
    - id: DEP-BEDROCK-GITHUB-BOUNDARY
      name: GitHub Integration Boundary
      environment: external
      region: global
      account: github
      cluster: external
      namespace: app
      trustZone: external

  controls:
    - id: CTRL-BEDROCK-WEBHOOK-SIGNATURE
      name: Webhook Signature Verification
      category: input-integrity
      description: Enforce signature verification for all GitHub webhook events.
    - id: CTRL-BEDROCK-SECRETS-ROTATION
      name: Secret Rotation Enforcement
      category: credential-management
      description: Rotate app and model credentials according to policy.

  controlAllocations:
    - id: ALLOC-SI-10-WEBHOOK
      controlRef: CTRL-BEDROCK-WEBHOOK-SIGNATURE
      oscalControlIds: [si-10]
      appliesTo: [FU-GITHUB-WEBHOOK-INGRESS, IF-BEDROCK-WEBHOOK-API]
      implementationType: technical
      status: implemented
      narrative: Validate webhook signatures and reject invalid payloads before processing.
      evidence:
        - path: src/webhook_ingress.go
          description: Signature validation entrypoint.
      responsibleRoles: [ACT-SECURITY-ENGINEER]
    - id: ALLOC-IA-5-SECRETS
      controlRef: CTRL-BEDROCK-SECRETS-ROTATION
      oscalControlIds: [ia-5]
      appliesTo: [FU-SECRETS-CONFIGURATION, FU-LAMBDA-RUNTIME-OPERATIONS]
      implementationType: hybrid
      status: implemented
      narrative: Rotate secrets and enforce managed credential lifecycle for app runtime.
      evidence:
        - path: infra/terraform/main.tf
          description: Secret lifecycle and rotation policy.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]

  trustBoundaries:
    - id: TB-BEDROCK-GITHUB-EXTERNAL
      name: GitHub External Boundary
      description: Boundary between external GitHub traffic and internal review processing.
    - id: TB-BEDROCK-AWS-CONTROL
      name: AWS Control Boundary
      description: Boundary between app workloads and privileged platform controls.

  states:
    - id: STATE-BEDROCK-PR-RECEIVED
      name: PR Received
      description: PR webhook accepted and queued for analysis.
    - id: STATE-BEDROCK-REVIEW-PUBLISHED
      name: Review Published
      description: Findings published to GitHub check run output.

  events:
    - id: EVT-BEDROCK-REVIEW-REQUESTED
      name: Review Requested
      description: Trigger for analysis orchestration.
    - id: EVT-BEDROCK-REVIEW-COMPLETED
      name: Review Completed
      description: Trigger indicating publication complete.

  flows:
    - id: FLOW-BEDROCK-PR-REVIEW
      title: PR Review Interaction Flow
      entry: [receive-webhook]
      exits: [publish-review]
      steps:
        - id: receive-webhook
          kind: user_action
          ref: ACT-DEVELOPER
          action: Developer pushes PR updates that trigger webhook processing
          next: [assemble-context]
        - id: assemble-context
          kind: system_action
          ref: FU-PR-CONTEXT-ASSEMBLY
          action: Build bounded review context
          dataOut: [pr_context]
          next: [orchestrate-review]
        - id: orchestrate-review
          kind: system_action
          ref: FU-REVIEW-ORCHESTRATION
          action: Run AI + policy checks and prepare findings
          dataIn: [pr_context]
          dataOut: [review_findings]
          async: true
          onError: [publish-review]
          next: [publish-review]
        - id: publish-review
          kind: system_action
          ref: FU-REVIEW-PUBLICATION
          action: Publish findings to GitHub check run
          dataIn: [review_findings]
    - id: FLOW-BEDROCK-POLICY-TUNING
      title: Security Policy Tuning Flow
      entry: [update-policy-rules]
      exits: [publish-policy-validation]
      steps:
        - id: update-policy-rules
          kind: user_action
          ref: ACT-SECURITY-ENGINEER
          action: Security engineer updates review policy rules
          next: [run-policy-checks]
        - id: run-policy-checks
          kind: system_action
          ref: FU-POLICY-CHECKS
          action: Execute deterministic policy checks on candidate rules
          dataOut: [policy_check_results]
          next: [orchestrate-policy-validation]
        - id: orchestrate-policy-validation
          kind: system_action
          ref: FU-REVIEW-ORCHESTRATION
          action: Orchestrate dry-run review validation with policy outputs
          dataIn: [policy_check_results]
          dataOut: [validation_findings]
          next: [publish-policy-validation]
        - id: publish-policy-validation
          kind: system_action
          ref: FU-REVIEW-PUBLICATION
          action: Publish policy validation findings to repository maintainers
          dataIn: [validation_findings]

  mappings:
    - type: contains
      from: FG-PR-INTEGRATION
      to: FU-GITHUB-WEBHOOK-INGRESS
    - type: contains
      from: FG-PR-INTEGRATION
      to: FU-PR-CONTEXT-ASSEMBLY
    - type: contains
      from: FG-REVIEW-INTELLIGENCE
      to: FU-REVIEW-ORCHESTRATION
    - type: contains
      from: FG-REVIEW-INTELLIGENCE
      to: FU-POLICY-CHECKS
    - type: contains
      from: FG-REVIEW-INTELLIGENCE
      to: FU-REVIEW-PUBLICATION
    - type: contains
      from: FG-PLATFORM-OPERATIONS
      to: FU-LAMBDA-RUNTIME-OPERATIONS
    - type: contains
      from: FG-PLATFORM-OPERATIONS
      to: FU-SECRETS-CONFIGURATION

    - type: interacts_with
      from: ACT-DEVELOPER
      to: FU-GITHUB-WEBHOOK-INGRESS
      description: Developer push/update activity triggers pull request webhook events.
    - type: interacts_with
      from: ACT-SECURITY-ENGINEER
      to: FU-POLICY-CHECKS
      description: Maintains and evolves deterministic security checks.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-LAMBDA-RUNTIME-OPERATIONS
      description: Operates deployments, scaling controls, and runtime observability.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-SECRETS-CONFIGURATION
      description: Rotates credentials and manages secure configuration lifecycle.
    - type: interacts_with
      from: ACT-REPOSITORY-MAINTAINER
      to: FU-REVIEW-PUBLICATION
      description: Reviews findings and gate decisions before merge.

    - type: depends_on
      from: FU-GITHUB-WEBHOOK-INGRESS
      to: FU-PR-CONTEXT-ASSEMBLY
      description: Forwards authenticated PR events for context assembly.
    - type: calls
      from: FU-GITHUB-WEBHOOK-INGRESS
      to: IF-BEDROCK-WEBHOOK-API
      description: Receives webhook payload through signed API endpoint.
    - type: depends_on
      from: FU-PR-CONTEXT-ASSEMBLY
      to: REF-GITHUB-APP-API
      description: Fetches pull request files and metadata.
    - type: depends_on
      from: FU-PR-CONTEXT-ASSEMBLY
      to: FU-REVIEW-ORCHESTRATION
      description: Sends normalized review context.
    - type: writes
      from: FU-PR-CONTEXT-ASSEMBLY
      to: DO-BEDROCK-PR-CONTEXT
      description: Persists normalized context payload.
    - type: depends_on
      from: FU-REVIEW-ORCHESTRATION
      to: REF-AWS-BEDROCK-RUNTIME
      description: Requests model analysis for code review findings.
    - type: depends_on
      from: FU-REVIEW-ORCHESTRATION
      to: FU-POLICY-CHECKS
      description: Merges deterministic policy findings with model output.
    - type: depends_on
      from: FU-REVIEW-ORCHESTRATION
      to: FU-REVIEW-PUBLICATION
      description: Submits final findings for publication.
    - type: reads
      from: FU-REVIEW-ORCHESTRATION
      to: DO-BEDROCK-PR-CONTEXT
      description: Reads normalized context before model call.
    - type: writes
      from: FU-REVIEW-ORCHESTRATION
      to: DO-BEDROCK-REVIEW-FINDINGS
      description: Persists merged deterministic and AI findings.
    - type: depends_on
      from: FU-POLICY-CHECKS
      to: REF-POLICY-RULESET
      description: Evaluates repository policy and risk rules.
    - type: depends_on
      from: FU-REVIEW-PUBLICATION
      to: REF-GITHUB-APP-API
      description: Publishes check runs and inline review comments.
    - type: calls
      from: FU-REVIEW-PUBLICATION
      to: IF-BEDROCK-REVIEW-PUBLISH-API
      description: Calls publication API for check-run output.
    - type: reads
      from: FU-REVIEW-PUBLICATION
      to: DO-BEDROCK-REVIEW-FINDINGS
      description: Reads final findings for publication.
    - type: depends_on
      from: FU-REVIEW-PUBLICATION
      to: FU-SECRETS-CONFIGURATION
      description: Retrieves app credentials and redaction rules.
    - type: depends_on
      from: FU-REVIEW-ORCHESTRATION
      to: FU-SECRETS-CONFIGURATION
      description: Retrieves model configuration and safety settings.
    - type: depends_on
      from: FU-LAMBDA-RUNTIME-OPERATIONS
      to: FU-SECRETS-CONFIGURATION
      description: Requires secure runtime configuration and credential access.
    - type: depends_on
      from: FU-LAMBDA-RUNTIME-OPERATIONS
      to: REF-AWS-SECRETS-MANAGER
      description: Uses managed secret store for runtime credentials.
    - type: deployed_to
      from: FU-GITHUB-WEBHOOK-INGRESS
      to: DEP-BEDROCK-LAMBDA-PRIMARY
      description: Webhook ingress executes in primary lambda runtime.
    - type: deployed_to
      from: FU-REVIEW-ORCHESTRATION
      to: DEP-BEDROCK-LAMBDA-PRIMARY
      description: Orchestration executes in primary lambda runtime.
    - type: deployed_to
      from: IF-BEDROCK-REVIEW-PUBLISH-API
      to: DEP-BEDROCK-GITHUB-BOUNDARY
      description: Publication API crosses GitHub integration boundary.
    - type: bounded_by
      from: FU-GITHUB-WEBHOOK-INGRESS
      to: TB-BEDROCK-GITHUB-EXTERNAL
      description: External ingress trust boundary.
    - type: bounded_by
      from: FU-LAMBDA-RUNTIME-OPERATIONS
      to: TB-BEDROCK-AWS-CONTROL
      description: Runtime platform control boundary.

    - type: targets
      from: AV-SPOOFED-GITHUB-WEBHOOK
      to: FU-GITHUB-WEBHOOK-INGRESS
    - type: targets
      from: AV-PROMPT-INJECTION-IN-DIFF
      to: FU-PR-CONTEXT-ASSEMBLY
    - type: targets
      from: AV-PROMPT-INJECTION-IN-DIFF
      to: FU-REVIEW-ORCHESTRATION
    - type: targets
      from: AV-SECRET-LEAKAGE-IN-REVIEW
      to: FU-REVIEW-PUBLICATION
    - type: targets
      from: AV-SECRET-LEAKAGE-IN-REVIEW
      to: FU-SECRETS-CONFIGURATION
    - type: targets
      from: AV-PR-SPAM-ABUSE
      to: FU-GITHUB-WEBHOOK-INGRESS
    - type: targets
      from: AV-PR-SPAM-ABUSE
      to: FU-REVIEW-ORCHESTRATION
    - type: mitigated_by
      from: AV-SPOOFED-GITHUB-WEBHOOK
      to: CTRL-BEDROCK-WEBHOOK-SIGNATURE
    - type: mitigated_by
      from: AV-SECRET-LEAKAGE-IN-REVIEW
      to: CTRL-BEDROCK-SECRETS-ROTATION

    - type: contains
      from: FU-GITHUB-WEBHOOK-INGRESS
      to: IF-BEDROCK-WEBHOOK-API
    - type: contains
      from: FU-REVIEW-PUBLICATION
      to: IF-BEDROCK-REVIEW-PUBLISH-API
    - type: contains
      from: FU-REVIEW-ORCHESTRATION
      to: DO-BEDROCK-PR-CONTEXT
    - type: contains
      from: FU-REVIEW-PUBLICATION
      to: DO-BEDROCK-REVIEW-FINDINGS

    - type: transitions_to
      from: STATE-BEDROCK-PR-RECEIVED
      to: STATE-BEDROCK-REVIEW-PUBLISHED
    - type: triggered_by
      from: STATE-BEDROCK-PR-RECEIVED
      to: EVT-BEDROCK-REVIEW-REQUESTED
    - type: triggered_by
      from: STATE-BEDROCK-REVIEW-PUBLISHED
      to: EVT-BEDROCK-REVIEW-COMPLETED
    - type: guarded_by
      from: STATE-BEDROCK-REVIEW-PUBLISHED
      to: CTRL-BEDROCK-WEBHOOK-SIGNATURE
    - type: guarded_by
      from: STATE-BEDROCK-REVIEW-PUBLISHED
      to: TB-BEDROCK-GITHUB-EXTERNAL

  risks:
    - id: RISK-BEDROCK-WEBHOOK-SPOOFING
      title: Webhook spoofing risk
      statement: Forged webhook requests could trigger unauthorized review actions.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-SECURITY-ENGINEER
      appliesTo: [FU-GITHUB-WEBHOOK-INGRESS, IF-BEDROCK-WEBHOOK-API]
      relatedControls: [CTRL-BEDROCK-WEBHOOK-SIGNATURE]
      attackVectors: [AV-SPOOFED-GITHUB-WEBHOOK]
      evidence:
        - path: src/webhook_ingress.go
      residualRisk: medium
      rationale: Signature verification is implemented; replay defenses are periodically revalidated.

  poamItems:
    - id: POAM-BEDROCK-REPLAY-HARDENING
      riskRef: RISK-BEDROCK-WEBHOOK-SPOOFING
      milestone: Add nonce and timestamp replay window hardening
      dueDate: 2026-07-15
      status: planned
      responsibleRole: ACT-SECURITY-ENGINEER
      artifacts:
        - path: tickets/SEC-2045.md

inferenceHints:
  runtimeSources:
    - ./infra/terraform
  codeSources:
    - ./src
  expectedRuntimeKinds:
    - terraform_resource
    - lambda_function
  ownershipResolutionOrder:
    - explicit_annotation
    - path_convention
    - unresolved_warning

views:
  - id: VIEW-ARCHITECTURE-INTENT
    kind: architecture-intent
    roots:
      - FG-PR-INTEGRATION
      - FG-REVIEW-INTELLIGENCE
      - FG-PLATFORM-OPERATIONS
    authoredStatus: stable
    authoredStatusExplanation: Authored capability boundaries and ownership responsibilities are stable for this release.

  - id: VIEW-COMMUNICATION
    kind: communication
    roots:
      - FU-GITHUB-WEBHOOK-INGRESS
      - FU-PR-CONTEXT-ASSEMBLY
      - FU-REVIEW-ORCHESTRATION
      - FU-POLICY-CHECKS
      - FU-REVIEW-PUBLICATION
    authoredStatus: in-review
    authoredStatusExplanation: Communication sequencing is defined, while protocol-level metadata is still being expanded.

  - id: VIEW-DEPLOYMENT
    kind: deployment
    roots:
      - FU-GITHUB-WEBHOOK-INGRESS
      - FU-PR-CONTEXT-ASSEMBLY
      - FU-REVIEW-ORCHESTRATION
      - FU-POLICY-CHECKS
      - FU-REVIEW-PUBLICATION
      - FU-LAMBDA-RUNTIME-OPERATIONS
      - FU-SECRETS-CONFIGURATION
    authoredStatus: in-review
    authoredStatusExplanation: Deployment and runtime mapping are present; observability and ownership evidence are still evolving.

  - id: VIEW-SECURITY
    kind: security
    roots:
      - FG-PR-INTEGRATION
      - FG-REVIEW-INTELLIGENCE
      - FG-PLATFORM-OPERATIONS
      - AV-SPOOFED-GITHUB-WEBHOOK
      - AV-PROMPT-INJECTION-IN-DIFF
      - AV-SECRET-LEAKAGE-IN-REVIEW
      - AV-PR-SPAM-ABUSE
    authoredStatus: draft
    authoredStatusExplanation: Core threats are modeled; control-depth and detection mappings are still being expanded.

  - id: VIEW-TRACEABILITY
    kind: traceability
    roots:
      - FU-GITHUB-WEBHOOK-INGRESS
      - FU-PR-CONTEXT-ASSEMBLY
      - FU-REVIEW-ORCHESTRATION
      - FU-POLICY-CHECKS
      - FU-REVIEW-PUBLICATION
      - FU-LAMBDA-RUNTIME-OPERATIONS
      - FU-SECRETS-CONFIGURATION
    authoredStatus: in-review
    authoredStatusExplanation: Requirement mappings exist; evidence completeness and consistency are still being hardened.
  - id: VIEW-INTERACTION-FLOW
    kind: interaction-flow
    roots:
      - FLOW-BEDROCK-PR-REVIEW
      - FLOW-BEDROCK-POLICY-TUNING
    includeKinds: [flow, flow_step, actor, functional_unit, interface, data_object]
    includeMappings: [flow_next, flow_error, flow_async, flow_ref, contains, calls, reads, writes, publishes, subscribes, streams]
    authoredStatus: in-review
    authoredStatusExplanation: Interaction flow captures PR review causality from ingress through publication.
  - id: VIEW-STATE-LIFECYCLE
    kind: state-lifecycle
    roots:
      - STATE-BEDROCK-PR-RECEIVED
    includeKinds: [state, event, control, trust_boundary]
    includeMappings: [transitions_to, triggered_by, guarded_by]
    authoredStatus: in-review
    authoredStatusExplanation: Review lifecycle states and guarded transitions are explicitly modeled.
