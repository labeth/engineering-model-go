model:
  id: sample-payments-layered-model
  title: Sample Payments Layered Architecture
  introduction: |
    This document describes the payments architecture using authored functional design and inferred runtime/code realization.
    It is intended to help product, platform, security, and implementation engineers reason about one shared model.
    Functional design is kept stable while realization details are inferred from infrastructure and source artifacts.
  baseCatalogRef: ./catalog.yml

authoredArchitecture:
  functionalGroups:
    - id: FG-PAYMENTS
      name: Payments
      description: Core payment checkout and authorization domain.
      prose: |
        The payments group defines the product-facing payment journey from user intent to final payment outcome.
        It owns the consistency of customer messaging and transaction decisions when a payment is attempted,
        declined, retried, or temporarily unavailable. The group keeps customer flow stable while depending on
        fraud and external bank capabilities.
    - id: FG-FRAUD
      name: Fraud Evaluation
      description: Risk scoring and fraud audit domain.
      prose: |
        The fraud evaluation group exists to reduce unsafe approvals while preserving throughput for legitimate payments.
        It combines automated risk scoring with manual support review so uncertain transactions move through a controlled
        escalation path. The group ensures risk decisions are explainable, auditable, and operationally actionable.
    - id: FG-PLATFORM
      name: Platform
      description: Cluster provisioning and GitOps operations domain.
      prose: |
        The platform group provides the runtime and deployment foundation used by all product capabilities.
        It owns environment provisioning, namespace and cluster boundaries, and continuous reconciliation behavior.
        The group enables safe delivery and reliable operations without owning payment business logic.

  functionalUnits:
    - id: FU-CHECKOUT
      name: Checkout Handling
      group: FG-PAYMENTS
      prose: |
        Checkout handling is the user-facing entrypoint where payment requests are initiated and normalized.
        It validates request shape, preserves transaction context, and returns clear customer feedback for each outcome.
        It delegates decision logic to payment authorization while protecting the user experience boundary.
    - id: FU-PAYMENT-AUTHORIZATION
      name: Payment Authorization
      group: FG-PAYMENTS
      prose: |
        Payment authorization orchestrates the final transaction decision path.
        It coordinates fraud scoring, external bank interactions, and escalation to support review when needed.
        The unit returns deterministic outcomes so downstream behavior remains consistent and testable.
    - id: FU-RISK-SCORING
      name: Risk Scoring
      group: FG-FRAUD
      prose: |
        Risk scoring computes and classifies transaction risk before approval decisions are finalized.
        It provides a stable scoring contract to authorization and supports audit context for later analysis.
        The unit is focused on decision quality, consistency, and policy-driven classification behavior.
    - id: FU-SUPPORT-REVIEW
      name: Support Review
      group: FG-FRAUD
      prose: |
        Support review handles manual decisions for escalated or ambiguous payment cases.
        It gives support operators context to approve, reject, or request additional verification in a controlled flow.
        The unit ensures manual intervention remains auditable, policy-constrained, and operationally reliable.
    - id: FU-CLUSTER-PROVISIONING
      name: Cluster Provisioning
      group: FG-PLATFORM
      tags: [day1]
      prose: |
        Cluster provisioning creates the runtime substrate used by all application workloads.
        It establishes cluster and namespace structure, baseline controls, and environment-level readiness.
        This unit is responsible for predictable, repeatable infrastructure foundations.
    - id: FU-GITOPS-OPERATIONS
      name: GitOps Operations
      group: FG-PLATFORM
      tags: [day2]
      prose: |
        GitOps operations continuously reconciles intended release state with actual runtime state.
        It governs rollout flow, drift correction, and operational delivery confidence across payment and fraud workloads.
        The unit provides safe and observable release behavior as an ongoing operational capability.

  actors:
    - id: ACT-CUSTOMER
      name: Customer
      description: Starts checkout and confirms payment.
    - id: ACT-SUPPORT
      name: Support Agent
      description: Reviews high-risk and declined-payment cases.
    - id: ACT-PLATFORM-OPERATOR
      name: Platform Operator
      description: Operates GitOps and platform lifecycle.

  attackVectors:
    - id: AV-MALICIOUS-API-REQUEST
      name: Malicious API Request
      description: Crafted payloads attempting to bypass authorization controls.
    - id: AV-FRAUDULENT-TRANSACTION-PATTERN
      name: Fraudulent Transaction Pattern
      description: Coordinated abuse pattern using synthetic identities, stolen instruments, and velocity anomalies to seek unauthorized approvals.
    - id: AV-REPLAYED-AUTH-CALLBACK
      name: Replayed Authorization Callback
      description: Replay attack against external authorization callback flow.
    - id: AV-COMPROMISED-DEPENDENCY
      name: Compromised Dependency
      description: Supply chain compromise in external SDK or image.

  referencedElements:
    - id: REF-BANK-GATEWAY-ENDPOINT
      kind: external_service_endpoint
      layer: runtime
      name: Bank Gateway Endpoint
    - id: REF-POSTGRES-DRIVER
      kind: third_party_library
      layer: code
      name: PostgreSQL Client Driver
    - id: REF-HELM-PLATFORM
      kind: platform_service
      layer: runtime
      name: Helm Runtime Platform

  interfaces:
    - id: IF-PAYMENTS-CHECKOUT-API
      name: Checkout API Interface
      protocol: https
      endpoint: /api/checkout
      schemaRef: schemas/checkout-request.json
      owner: FU-CHECKOUT
    - id: IF-PAYMENTS-BANK-AUTH
      name: Bank Authorization Interface
      protocol: https
      endpoint: /bank/authorize
      schemaRef: schemas/bank-auth.json
      owner: FU-PAYMENT-AUTHORIZATION
    - id: IF-PAYMENTS-RISK-SCORE-API
      name: Risk Score Interface
      protocol: https
      endpoint: /risk/score
      schemaRef: schemas/risk-score.json
      owner: FU-RISK-SCORING

  dataObjects:
    - id: DO-PAYMENTS-AUTH-REQUEST
      name: Authorization Request
      termRef: DATA-PAYMENT-REQUEST
      schemaRef: schemas/auth-request.json
      sensitivity: confidential
      classification: pci
      regulatoryTags: [pci-dss]
      retention: 400_days
      confidentiality: high
      integrity: high
      availability: medium
    - id: DO-PAYMENTS-AUTH-DECISION
      name: Authorization Decision
      termRef: DATA-AUTH-DECISION
      schemaRef: schemas/auth-decision.json
      sensitivity: internal
      classification: regulated-internal
      regulatoryTags: [pci-dss]
      retention: 400_days
      confidentiality: medium
      integrity: high
      availability: high
    - id: DO-PAYMENTS-RISK-SIGNAL
      name: Risk Signal
      schemaRef: schemas/risk-signal.json
      sensitivity: internal
      classification: fraud-analytics
      regulatoryTags: [fraud-monitoring]
      retention: 365_days
      confidentiality: medium
      integrity: high
      availability: medium
    - id: DO-PAYMENTS-REVIEW-TICKET
      name: Manual Review Ticket
      schemaRef: schemas/review-ticket.json
      sensitivity: confidential
      classification: pii
      regulatoryTags: [pci-dss, internal-audit]
      retention: 730_days
      confidentiality: high
      integrity: high
      availability: medium

  deploymentTargets:
    - id: DEP-PAYMENTS-CLUSTER-PROD
      name: Payments Cluster Production
      environment: prod
      region: us-east-1
      account: shared-platform
      cluster: payments-prod
      namespace: payments
      trustZone: app
    - id: DEP-PAYMENTS-BANK-EDGE
      name: Bank Edge Integration Zone
      environment: prod
      region: us-east-1
      account: external
      cluster: bank-edge
      namespace: partner
      trustZone: external

  flows:
    - id: FLOW-CUSTOMER-CHECKOUT
      title: Customer Checkout Authorization Flow
      kind: security
      methodology: owasp-tm
      direction: inbound
      frequency: realtime
      sourceRef: ACT-CUSTOMER
      destinationRef: FU-CHECKOUT
      protocol: https
      channel: public-api
      authentication: session-token
      encryptionInTransit: tls1.3
      integrityProtection: request-signature
      dataRefs: [DO-PAYMENTS-AUTH-REQUEST, DO-PAYMENTS-AUTH-DECISION]
      description: End-to-end checkout authorization including fraud and bank integration boundaries.
      entry: [submit-payment]
      exits: [show-outcome]
      threats: [TS-PAYMENTS-CHECKOUT-SPOOFING, TS-PAYMENTS-BANK-CALLBACK-REPLAY]
      steps:
        - id: submit-payment
          kind: user_action
          flowType: interaction
          direction: inbound
          frequency: realtime
          sourceRef: ACT-CUSTOMER
          destinationRef: FU-CHECKOUT
          ref: ACT-CUSTOMER
          action: Customer submits checkout payment form
          dataIn: [payment_method, billing_address, amount]
          dataRefs: [DO-PAYMENTS-AUTH-REQUEST]
          next: [normalize-request]
        - id: normalize-request
          kind: system_action
          flowType: security
          direction: internal
          frequency: realtime
          sourceRef: FU-CHECKOUT
          destinationRef: DO-PAYMENTS-AUTH-REQUEST
          ref: FU-CHECKOUT
          action: Normalize and validate checkout payload
          dataOut: [normalized_payment_request]
          dataRefs: [DO-PAYMENTS-AUTH-REQUEST]
          interfaceRef: IF-PAYMENTS-CHECKOUT-API
          authentication: schema-validation
          integrityProtection: strict-decoder
          onError: [show-outcome]
          next: [authorize-payment]
        - id: authorize-payment
          kind: system_action
          flowType: security
          direction: outbound
          frequency: realtime
          sourceRef: FU-PAYMENT-AUTHORIZATION
          destinationRef: IF-PAYMENTS-BANK-AUTH
          ref: FU-PAYMENT-AUTHORIZATION
          action: Request fraud score and external authorization
          dataIn: [normalized_payment_request]
          dataOut: [authorization_decision]
          dataRefs: [DO-PAYMENTS-AUTH-REQUEST, DO-PAYMENTS-AUTH-DECISION, DO-PAYMENTS-RISK-SIGNAL]
          interfaceRef: IF-PAYMENTS-BANK-AUTH
          trustBoundaryRef: TB-PAYMENTS-EXTERNAL-BANK
          boundaryCrossing: true
          authentication: mtls
          encryptionInTransit: tls1.3
          integrityProtection: nonce-hmac
          async: true
          onError: [show-outcome]
          next: [show-outcome]
        - id: show-outcome
          kind: system_action
          flowType: interaction
          direction: outbound
          frequency: realtime
          sourceRef: FU-CHECKOUT
          destinationRef: ACT-CUSTOMER
          ref: FU-CHECKOUT
          action: Return approval or decline outcome to customer
          dataIn: [authorization_decision]
          dataRefs: [DO-PAYMENTS-AUTH-DECISION]
    - id: FLOW-PAYMENTS-MANUAL-REVIEW
      title: High-Risk Manual Review Flow
      kind: control
      methodology: owasp-tm
      direction: internal
      frequency: on-demand
      sourceRef: FU-RISK-SCORING
      destinationRef: FU-SUPPORT-REVIEW
      protocol: internal-event
      channel: review-queue
      authentication: workload-identity
      encryptionInTransit: tls1.3
      integrityProtection: signed-event
      dataRefs: [DO-PAYMENTS-RISK-SIGNAL, DO-PAYMENTS-REVIEW-TICKET]
      description: Manual review escalation path for high-risk payment attempts.
      entry: [detect-high-risk]
      exits: [complete-review]
      threats: [TS-PAYMENTS-RISK-TICKET-TAMPER]
      steps:
        - id: detect-high-risk
          kind: system_action
          flowType: control
          direction: internal
          frequency: on-demand
          sourceRef: FU-RISK-SCORING
          destinationRef: DO-PAYMENTS-RISK-SIGNAL
          ref: FU-RISK-SCORING
          action: Detect high-risk signal and emit escalation trigger
          dataOut: [risk_signal]
          dataRefs: [DO-PAYMENTS-RISK-SIGNAL]
          next: [create-review-ticket]
        - id: create-review-ticket
          kind: system_action
          flowType: control
          direction: internal
          frequency: on-demand
          sourceRef: FU-SUPPORT-REVIEW
          destinationRef: DO-PAYMENTS-REVIEW-TICKET
          ref: FU-SUPPORT-REVIEW
          action: Create manual review ticket for support operations
          dataIn: [risk_signal]
          dataOut: [review_ticket]
          dataRefs: [DO-PAYMENTS-RISK-SIGNAL, DO-PAYMENTS-REVIEW-TICKET]
          authentication: workforce-sso-mfa
          integrityProtection: append-only-audit-log
          next: [complete-review]
        - id: complete-review
          kind: system_action
          flowType: control
          direction: internal
          frequency: on-demand
          sourceRef: FU-PAYMENT-AUTHORIZATION
          destinationRef: FU-CHECKOUT
          ref: FU-PAYMENT-AUTHORIZATION
          action: Complete authorization using manual review outcome
          dataIn: [review_ticket]
          dataRefs: [DO-PAYMENTS-REVIEW-TICKET, DO-PAYMENTS-AUTH-DECISION]

  threatAssumptions:
    - id: ASM-PAYMENTS-BANK-SIGNING-VALID
      title: Bank callback signatures are managed securely
      statement: External bank callbacks include valid timestamped signatures generated from managed key material.
      status: accepted
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [IF-PAYMENTS-BANK-AUTH, FU-PAYMENT-AUTHORIZATION, TB-PAYMENTS-EXTERNAL-BANK]
      rationale: Contractual controls and quarterly partner assurance reviews support this assumption.
      evidence:
        - path: docs/security/bank-callback-signed-contract.md
          description: Partner integration contract requiring signed callback payloads.

  threatOutOfScope:
    - id: OOS-PAYMENTS-BANK-HSM-OPERATIONS
      title: Bank partner HSM internals
      reason: Key management implementation details within the partner bank infrastructure are not accessible to this team.
      status: approved
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [REF-BANK-GATEWAY-ENDPOINT, TB-PAYMENTS-EXTERNAL-BANK]
      expiresOn: 2027-12-31
      evidence:
        - path: docs/security/partner-boundary-statement.md
          description: Shared responsibility statement for partner cryptographic infrastructure.

  threatScenarios:
    - id: TS-PAYMENTS-CHECKOUT-SPOOFING
      title: Checkout payload spoofing bypasses normalization checks
      summary: Crafted payload shape attempts to force ambiguous authorization behavior and bypass policy checks.
      category: application-abuse
      stride: tampering
      cwe: [CWE-20, CWE-345]
      attackVectorRef: AV-MALICIOUS-API-REQUEST
      appliesTo: [FU-CHECKOUT, IF-PAYMENTS-CHECKOUT-API, DO-PAYMENTS-AUTH-REQUEST]
      flowRefs: [FLOW-CUSTOMER-CHECKOUT]
      entryPoint: IF-PAYMENTS-CHECKOUT-API
      preconditions: [invalid-schema-acceptance, weak-normalization-rules]
      exploitPath: [submit-payment, normalize-request, authorize-payment]
      likelihood: medium
      impact: high
      severity: high
      status: mitigating
      owner: ACT-PLATFORM-OPERATOR
      riskRef: RISK-PAYMENTS-CHECKOUT-SPOOFING
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      assumptionRefs: [ASM-PAYMENTS-BANK-SIGNING-VALID]
      outOfScopeRefs: [OOS-PAYMENTS-BANK-HSM-OPERATIONS]
      mitigationRefs: [MIT-PAYMENTS-CHECKOUT-STRICT-SCHEMA]
      verificationRefs: [CV-PAYMENTS-CHECKOUT-SCHEMA-TEST]
      detection: [api-validation-errors, unusual-checkout-failure-ratio]
      evidence:
        - path: tests/contract/checkout_decline_response_test.go
          description: Contract tests for malformed request behavior.
    - id: TS-PAYMENTS-BANK-CALLBACK-REPLAY
      title: Replayed bank callback triggers duplicate authorization transition
      summary: Replayed callback message tries to overwrite or duplicate prior decision outcomes.
      category: integration-abuse
      stride: replay
      cwe: [CWE-294]
      attackVectorRef: AV-REPLAYED-AUTH-CALLBACK
      appliesTo: [FU-PAYMENT-AUTHORIZATION, IF-PAYMENTS-BANK-AUTH, DO-PAYMENTS-AUTH-DECISION]
      flowRefs: [FLOW-CUSTOMER-CHECKOUT]
      entryPoint: IF-PAYMENTS-BANK-AUTH
      preconditions: [nonce-window-too-wide, callback-idempotency-gap]
      exploitPath: [authorize-payment, show-outcome]
      likelihood: medium
      impact: high
      severity: high
      status: mitigating
      owner: ACT-PLATFORM-OPERATOR
      riskRef: RISK-PAYMENTS-BANK-CALLBACK-REPLAY
      relatedControls: [CTRL-PAYMENTS-CALLBACK-NONCE]
      assumptionRefs: [ASM-PAYMENTS-BANK-SIGNING-VALID]
      outOfScopeRefs: [OOS-PAYMENTS-BANK-HSM-OPERATIONS]
      mitigationRefs: [MIT-PAYMENTS-CALLBACK-NONCE-CHECK]
      verificationRefs: [CV-PAYMENTS-CALLBACK-REPLAY-TEST]
      detection: [duplicate-callback-id, replay-window-alert]
      evidence:
        - path: tests/contract/checkout_decline_response_test.go
          description: Contract test suite includes repeated callback handling checks.
    - id: TS-PAYMENTS-RISK-TICKET-TAMPER
      title: Manual review ticket tampering influences authorization result
      summary: A compromised support or workflow path modifies review ticket outcomes before authorization completes.
      category: insider-abuse
      stride: tampering
      cwe: [CWE-285]
      attackVectorRef: AV-FRAUDULENT-TRANSACTION-PATTERN
      appliesTo: [FU-SUPPORT-REVIEW, DO-PAYMENTS-REVIEW-TICKET, FU-PAYMENT-AUTHORIZATION]
      flowRefs: [FLOW-PAYMENTS-MANUAL-REVIEW]
      entryPoint: FU-SUPPORT-REVIEW
      preconditions: [excessive-privileges, weak-audit-integrity]
      exploitPath: [create-review-ticket, complete-review]
      likelihood: low
      impact: high
      severity: medium
      status: identified
      owner: ACT-PLATFORM-OPERATOR
      riskRef: RISK-PAYMENTS-MANUAL-REVIEW-TAMPER
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      mitigationRefs: [MIT-PAYMENTS-MANUAL-REVIEW-AUDIT]
      verificationRefs: [CV-PAYMENTS-MANUAL-REVIEW-TRACE]
      detection: [review-ticket-diff-alert, privileged-action-audit]
      evidence:
        - path: docs/security/manual-review-control-notes.md
          description: Control notes for support review action integrity.

  controls:
    - id: CTRL-PAYMENTS-SSO-MFA
      name: SSO MFA Enforcement
      category: identity-access
      description: Enforce MFA and conditional access for privileged operations.
    - id: CTRL-PAYMENTS-IMAGE-DIGEST
      name: Immutable Image Digests
      category: supply-chain
      description: Enforce immutable digest-pinned container image references.
    - id: CTRL-PAYMENTS-CALLBACK-NONCE
      name: Callback Nonce and Idempotency Guard
      category: protocol-integrity
      description: Enforce nonce freshness and idempotency on bank callback processing.

  controlAllocations:
    - id: ALLOC-AC-2-IA-2-SSO
      controlRef: CTRL-PAYMENTS-SSO-MFA
      oscalControlIds: [ac-2, ia-2(1)]
      appliesTo: [FU-SUPPORT-REVIEW, FU-GITOPS-OPERATIONS]
      implementationType: technical
      status: implemented
      narrative: |
        Workforce access is mediated by centralized SSO with MFA and conditional access policy.
        Elevated operational actions require successful strong authentication before authorization.
      evidence:
        - path: infra/identity/sso-policy.yaml
          description: SSO policy with MFA and conditional access requirements.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]
    - id: ALLOC-CM-6-IMAGE-DIGEST
      controlRef: CTRL-PAYMENTS-IMAGE-DIGEST
      oscalControlIds: [cm-6]
      appliesTo: [FU-GITOPS-OPERATIONS, FU-CLUSTER-PROVISIONING]
      implementationType: hybrid
      status: implemented
      narrative: |
        Delivery pipelines and deployment manifests require immutable image digest pinning.
        Release automation rejects mutable tags in production deployment paths.
      evidence:
        - path: infra/flux/kustomization.yaml
          description: Flux deployment baseline references immutable release artifacts.
        - path: infra/helm/values-prod.yaml
          description: Production chart values pin immutable digest references.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]
    - id: ALLOC-SI-10-CALLBACK-NONCE
      controlRef: CTRL-PAYMENTS-CALLBACK-NONCE
      oscalControlIds: [si-10]
      appliesTo: [FU-PAYMENT-AUTHORIZATION, IF-PAYMENTS-BANK-AUTH]
      implementationType: technical
      status: implemented
      narrative: |
        Authorization callback handling validates nonce freshness and request idempotency before writing decisions.
        Duplicate callback identifiers are rejected and emitted as security-relevant telemetry.
      evidence:
        - path: src/payment_authorization.go
          description: Callback nonce and idempotency enforcement path.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]

  trustBoundaries:
    - id: TB-PAYMENTS-EXTERNAL-BANK
      name: External Bank Boundary
      description: Separates internal payment authorization from external bank services.
      boundaryType: network
      members: [FU-PAYMENT-AUTHORIZATION, IF-PAYMENTS-BANK-AUTH, DEP-PAYMENTS-BANK-EDGE]
    - id: TB-PAYMENTS-PLATFORM-CONTROL
      name: Platform Control Boundary
      description: Separates app workloads from platform control-plane authority.
      boundaryType: control-plane
      members: [FU-GITOPS-OPERATIONS, FU-CLUSTER-PROVISIONING, DEP-PAYMENTS-CLUSTER-PROD]

  states:
    - id: STATE-PAYMENTS-CHECKOUT-RECEIVED
      name: Checkout Received
      description: Payment request accepted at checkout boundary.
    - id: STATE-PAYMENTS-AUTHORIZED
      name: Payment Authorized
      description: Authorization decision approved.

  events:
    - id: EVT-PAYMENTS-AUTH-REQUESTED
      name: Authorization Requested
      description: Request sent to authorization orchestration.
    - id: EVT-PAYMENTS-AUTH-COMPLETED
      name: Authorization Completed
      description: Authorization decision returned to checkout.

  risks:
    - id: RISK-PAYMENTS-SSO-MFA-GAP
      title: Privileged SSO path bypass risk
      statement: Privileged operational actions may bypass MFA if SSO policy enforcement drifts.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [FU-GITOPS-OPERATIONS, FU-SUPPORT-REVIEW]
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      attackVectors: [AV-MALICIOUS-API-REQUEST]
      threatScenarios: [TS-PAYMENTS-RISK-TICKET-TAMPER]
      evidence:
        - path: infra/identity/sso-policy.yaml
          description: Active MFA policy configuration.
      residualRisk: medium
      rationale: Legacy operator account cleanup still in progress.
    - id: RISK-PAYMENTS-CHECKOUT-SPOOFING
      title: Checkout payload spoofing risk
      statement: Crafted checkout payloads may bypass validation and force unintended authorization paths.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [FU-CHECKOUT, IF-PAYMENTS-CHECKOUT-API]
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      attackVectors: [AV-MALICIOUS-API-REQUEST]
      threatScenarios: [TS-PAYMENTS-CHECKOUT-SPOOFING]
      evidence:
        - path: tests/contract/checkout_decline_response_test.go
          description: Contract tests for malformed request decline behavior.
      residualRisk: medium
      rationale: Validation controls are implemented but continuously tuned as payload variants evolve.
    - id: RISK-PAYMENTS-BANK-CALLBACK-REPLAY
      title: Bank callback replay risk
      statement: Replayed authorization callbacks may produce duplicate or stale decision transitions.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [FU-PAYMENT-AUTHORIZATION, IF-PAYMENTS-BANK-AUTH]
      relatedControls: [CTRL-PAYMENTS-CALLBACK-NONCE]
      attackVectors: [AV-REPLAYED-AUTH-CALLBACK]
      threatScenarios: [TS-PAYMENTS-BANK-CALLBACK-REPLAY]
      evidence:
        - path: src/payment_authorization.go
          description: Callback nonce and idempotency checks.
      residualRisk: low
      rationale: Nonce and idempotency controls sharply reduce replay window impact.
    - id: RISK-PAYMENTS-MANUAL-REVIEW-TAMPER
      title: Manual review decision tampering risk
      statement: Privileged workflow manipulation may alter manual review outcomes before final decision publication.
      status: open
      likelihood: low
      impact: high
      response: mitigate
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [FU-SUPPORT-REVIEW, DO-PAYMENTS-REVIEW-TICKET]
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      attackVectors: [AV-FRAUDULENT-TRANSACTION-PATTERN]
      threatScenarios: [TS-PAYMENTS-RISK-TICKET-TAMPER]
      evidence:
        - path: docs/security/manual-review-control-notes.md
          description: Current integrity controls for support workflow.
      residualRisk: medium
      rationale: Audit coverage is present but needs tighter immutable trail enforcement.

  controlVerifications:
    - id: CV-PAYMENTS-CHECKOUT-SCHEMA-TEST
      controlRef: CTRL-PAYMENTS-SSO-MFA
      threatScenarioRefs: [TS-PAYMENTS-CHECKOUT-SPOOFING]
      riskRefs: [RISK-PAYMENTS-CHECKOUT-SPOOFING]
      method: test
      status: pass
      owner: ACT-PLATFORM-OPERATOR
      lastTested: 2026-04-10
      findings:
        - malformed checkout payloads rejected with deterministic decline path
      evidence:
        - path: tests/contract/checkout_decline_response_test.go
          description: Payload validation regression test.
    - id: CV-PAYMENTS-CALLBACK-REPLAY-TEST
      controlRef: CTRL-PAYMENTS-CALLBACK-NONCE
      threatScenarioRefs: [TS-PAYMENTS-BANK-CALLBACK-REPLAY]
      riskRefs: [RISK-PAYMENTS-BANK-CALLBACK-REPLAY]
      method: test
      status: pass
      owner: ACT-PLATFORM-OPERATOR
      lastTested: 2026-04-15
      findings:
        - duplicate callback identifiers correctly rejected
      evidence:
        - path: tests/contract/checkout_decline_response_test.go
          description: Replay and idempotency assertions for callback path.
    - id: CV-PAYMENTS-MANUAL-REVIEW-TRACE
      controlRef: CTRL-PAYMENTS-SSO-MFA
      threatScenarioRefs: [TS-PAYMENTS-RISK-TICKET-TAMPER]
      riskRefs: [RISK-PAYMENTS-MANUAL-REVIEW-TAMPER]
      method: analysis
      status: partial
      owner: ACT-PLATFORM-OPERATOR
      lastTested: 2026-04-20
      findings:
        - review ticket mutation trail exists but immutability controls are incomplete
