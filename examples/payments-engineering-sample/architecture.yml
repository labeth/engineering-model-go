model:
  id: sample-payments-layered-model
  title: Sample Payments Layered Architecture
  introduction: |
    This document describes the payments architecture using authored functional design and inferred runtime/code realization.
    It is intended to help product, platform, security, and implementation engineers reason about one shared model.
    Functional design is kept stable while realization details are inferred from infrastructure and source artifacts.
  baseCatalogRef: ./catalog.yml

authoredArchitecture:
  functionalGroups:
    - id: FG-PAYMENTS
      name: Payments
      description: Core payment checkout and authorization domain.
      prose: |
        The payments group defines the product-facing payment journey from user intent to final payment outcome.
        It owns the consistency of customer messaging and transaction decisions when a payment is attempted,
        declined, retried, or temporarily unavailable. The group keeps customer flow stable while depending on
        fraud and external bank capabilities.
    - id: FG-FRAUD
      name: Fraud Evaluation
      description: Risk scoring and fraud audit domain.
      prose: |
        The fraud evaluation group exists to reduce unsafe approvals while preserving throughput for legitimate payments.
        It combines automated risk scoring with manual support review so uncertain transactions move through a controlled
        escalation path. The group ensures risk decisions are explainable, auditable, and operationally actionable.
    - id: FG-PLATFORM
      name: Platform
      description: Cluster provisioning and GitOps operations domain.
      prose: |
        The platform group provides the runtime and deployment foundation used by all product capabilities.
        It owns environment provisioning, namespace and cluster boundaries, and continuous reconciliation behavior.
        The group enables safe delivery and reliable operations without owning payment business logic.

  functionalUnits:
    - id: FU-CHECKOUT
      name: Checkout Handling
      group: FG-PAYMENTS
      prose: |
        Checkout handling is the user-facing entrypoint where payment requests are initiated and normalized.
        It validates request shape, preserves transaction context, and returns clear customer feedback for each outcome.
        It delegates decision logic to payment authorization while protecting the user experience boundary.
    - id: FU-PAYMENT-AUTHORIZATION
      name: Payment Authorization
      group: FG-PAYMENTS
      prose: |
        Payment authorization orchestrates the final transaction decision path.
        It coordinates fraud scoring, external bank interactions, and escalation to support review when needed.
        The unit returns deterministic outcomes so downstream behavior remains consistent and testable.
    - id: FU-RISK-SCORING
      name: Risk Scoring
      group: FG-FRAUD
      prose: |
        Risk scoring computes and classifies transaction risk before approval decisions are finalized.
        It provides a stable scoring contract to authorization and supports audit context for later analysis.
        The unit is focused on decision quality, consistency, and policy-driven classification behavior.
    - id: FU-SUPPORT-REVIEW
      name: Support Review
      group: FG-FRAUD
      prose: |
        Support review handles manual decisions for escalated or ambiguous payment cases.
        It gives support operators context to approve, reject, or request additional verification in a controlled flow.
        The unit ensures manual intervention remains auditable, policy-constrained, and operationally reliable.
    - id: FU-CLUSTER-PROVISIONING
      name: Cluster Provisioning
      group: FG-PLATFORM
      tags: [day1]
      prose: |
        Cluster provisioning creates the runtime substrate used by all application workloads.
        It establishes cluster and namespace structure, baseline controls, and environment-level readiness.
        This unit is responsible for predictable, repeatable infrastructure foundations.
    - id: FU-GITOPS-OPERATIONS
      name: GitOps Operations
      group: FG-PLATFORM
      tags: [day2]
      prose: |
        GitOps operations continuously reconciles intended release state with actual runtime state.
        It governs rollout flow, drift correction, and operational delivery confidence across payment and fraud workloads.
        The unit provides safe and observable release behavior as an ongoing operational capability.

  actors:
    - id: ACT-CUSTOMER
      name: Customer
      description: Starts checkout and confirms payment.
    - id: ACT-SUPPORT
      name: Support Agent
      description: Reviews high-risk and declined-payment cases.
    - id: ACT-PLATFORM-OPERATOR
      name: Platform Operator
      description: Operates GitOps and platform lifecycle.

  attackVectors:
    - id: AV-MALICIOUS-API-REQUEST
      name: Malicious API Request
      description: Crafted payloads attempting to bypass authorization controls.
    - id: AV-FRAUDULENT-TRANSACTION-PATTERN
      name: Fraudulent Transaction Pattern
      description: Coordinated abuse pattern using synthetic identities, stolen instruments, and velocity anomalies to seek unauthorized approvals.
    - id: AV-REPLAYED-AUTH-CALLBACK
      name: Replayed Authorization Callback
      description: Replay attack against external authorization callback flow.
    - id: AV-COMPROMISED-DEPENDENCY
      name: Compromised Dependency
      description: Supply chain compromise in external SDK or image.

  referencedElements:
    - id: REF-BANK-GATEWAY-ENDPOINT
      kind: external_service_endpoint
      layer: runtime
      name: Bank Gateway Endpoint
    - id: REF-POSTGRES-DRIVER
      kind: third_party_library
      layer: code
      name: PostgreSQL Client Driver
    - id: REF-HELM-PLATFORM
      kind: platform_service
      layer: runtime
      name: Helm Runtime Platform

  flows:
    - id: FLOW-CUSTOMER-CHECKOUT
      title: Customer Checkout Authorization Flow
      entry: [submit-payment]
      exits: [show-outcome]
      steps:
        - id: submit-payment
          kind: user_action
          ref: ACT-CUSTOMER
          action: Customer submits checkout payment form
          dataIn: [payment_method, billing_address, amount]
          next: [normalize-request]
        - id: normalize-request
          kind: system_action
          ref: FU-CHECKOUT
          action: Normalize and validate checkout payload
          dataOut: [normalized_payment_request]
          onError: [show-outcome]
          next: [authorize-payment]
        - id: authorize-payment
          kind: system_action
          ref: FU-PAYMENT-AUTHORIZATION
          action: Request fraud score and external authorization
          dataIn: [normalized_payment_request]
          dataOut: [authorization_decision]
          async: true
          onError: [show-outcome]
          next: [show-outcome]
        - id: show-outcome
          kind: system_action
          ref: FU-CHECKOUT
          action: Return approval or decline outcome to customer
          dataIn: [authorization_decision]

  mappings:
    - type: contains
      from: FG-PAYMENTS
      to: FU-CHECKOUT
    - type: contains
      from: FG-PAYMENTS
      to: FU-PAYMENT-AUTHORIZATION
    - type: contains
      from: FG-FRAUD
      to: FU-RISK-SCORING
    - type: contains
      from: FG-FRAUD
      to: FU-SUPPORT-REVIEW
    - type: contains
      from: FG-PLATFORM
      to: FU-CLUSTER-PROVISIONING
    - type: contains
      from: FG-PLATFORM
      to: FU-GITOPS-OPERATIONS

    - type: interacts_with
      from: ACT-CUSTOMER
      to: FU-CHECKOUT
      description: Submits payment at checkout.
    - type: interacts_with
      from: ACT-SUPPORT
      to: FU-SUPPORT-REVIEW
      description: Performs manual payment reviews.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-GITOPS-OPERATIONS
      description: Operates delivery and release workflows.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-CLUSTER-PROVISIONING
      description: Maintains cluster baseline and environment setup.

    - type: depends_on
      from: FU-CHECKOUT
      to: FU-PAYMENT-AUTHORIZATION
      description: Delegates payment authorization.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: FU-RISK-SCORING
      description: Requests fraud scoring before final authorization.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: REF-BANK-GATEWAY-ENDPOINT
      description: Calls external bank authorization endpoint.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: FU-SUPPORT-REVIEW
      description: Escalates high-risk payments for manual review.
    - type: depends_on
      from: FU-RISK-SCORING
      to: REF-POSTGRES-DRIVER
      description: Uses external library for audit persistence.
    - type: depends_on
      from: FU-GITOPS-OPERATIONS
      to: FU-CLUSTER-PROVISIONING
      description: Relies on provisioned cluster and namespace baseline.
    - type: depends_on
      from: FU-GITOPS-OPERATIONS
      to: REF-HELM-PLATFORM
      description: Uses Helm runtime platform for release orchestration.

    - type: targets
      from: AV-MALICIOUS-API-REQUEST
      to: FU-CHECKOUT
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-RISK-SCORING
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-PAYMENT-AUTHORIZATION
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-SUPPORT-REVIEW
    - type: targets
      from: AV-REPLAYED-AUTH-CALLBACK
      to: FU-PAYMENT-AUTHORIZATION
    - type: targets
      from: AV-COMPROMISED-DEPENDENCY
      to: REF-POSTGRES-DRIVER

inferenceHints:
  runtimeSources:
    - ./infra/terraform
    - ./infra/flux
    - ./infra/helm
  codeSources:
    - ./src
  expectedRuntimeKinds:
    - cluster
    - namespace
    - workload
  ownershipResolutionOrder:
    - explicit_annotation
    - path_convention
    - unresolved_warning

views:
  - id: VIEW-ARCHITECTURE-INTENT
    kind: architecture-intent
    roots: [FG-PAYMENTS, FG-FRAUD, FG-PLATFORM]
    authoredStatus: stable
    authoredStatusExplanation: Stable authored capability boundaries and ownership split; changes are intentional and infrequent.
  - id: VIEW-COMMUNICATION
    kind: communication
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-SUPPORT-REVIEW]
    authoredStatus: in-review
    authoredStatusExplanation: Communication semantics are partially inferred and still being refined with explicit protocol and interaction metadata.
  - id: VIEW-DEPLOYMENT
    kind: deployment
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-GITOPS-OPERATIONS]
    authoredStatus: in-review
    authoredStatusExplanation: Deployment chain and control-plane mapping are mostly present, but ownership evidence remains incomplete for some units.
  - id: VIEW-SECURITY
    kind: security
    roots: [FG-PAYMENTS, FG-FRAUD, FG-PLATFORM, AV-MALICIOUS-API-REQUEST, AV-FRAUDULENT-TRANSACTION-PATTERN, AV-REPLAYED-AUTH-CALLBACK, AV-COMPROMISED-DEPENDENCY]
    authoredStatus: draft
    authoredStatusExplanation: Threat mapping is present for key vectors, but control expectations and coverage breadth are still evolving.
  - id: VIEW-TRACEABILITY
    kind: traceability
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-SUPPORT-REVIEW, FU-CLUSTER-PROVISIONING, FU-GITOPS-OPERATIONS]
    authoredStatus: in-review
    authoredStatusExplanation: Requirement-to-unit linkage is present; cross-layer ownership consistency still needs tightening.
  - id: VIEW-INTERACTION-FLOW
    kind: interaction-flow
    roots: [FLOW-CUSTOMER-CHECKOUT]
    includeKinds: [flow, flow_step, actor, functional_unit]
    includeMappings: [flow_next, flow_error, flow_async, flow_ref]
    authoredStatus: in-review
    authoredStatusExplanation: Flow is authored for core checkout path and used to align UX/data movement semantics with architecture behavior.
