model:
  id: sample-payments-layered-model
  title: Sample Payments Layered Architecture
  introduction: |
    This document describes the payments architecture using authored functional design and inferred runtime/code realization.
    It is intended to help product, platform, security, and implementation engineers reason about one shared model.
    Functional design is kept stable while realization details are inferred from infrastructure and source artifacts.
  baseCatalogRef: ./catalog.yml

authoredArchitecture:
  functionalGroups:
    - id: FG-PAYMENTS
      name: Payments
      description: Core payment checkout and authorization domain.
      prose: |
        The payments group defines the product-facing payment journey from user intent to final payment outcome.
        It owns the consistency of customer messaging and transaction decisions when a payment is attempted,
        declined, retried, or temporarily unavailable. The group keeps customer flow stable while depending on
        fraud and external bank capabilities.
    - id: FG-FRAUD
      name: Fraud Evaluation
      description: Risk scoring and fraud audit domain.
      prose: |
        The fraud evaluation group exists to reduce unsafe approvals while preserving throughput for legitimate payments.
        It combines automated risk scoring with manual support review so uncertain transactions move through a controlled
        escalation path. The group ensures risk decisions are explainable, auditable, and operationally actionable.
    - id: FG-PLATFORM
      name: Platform
      description: Cluster provisioning and GitOps operations domain.
      prose: |
        The platform group provides the runtime and deployment foundation used by all product capabilities.
        It owns environment provisioning, namespace and cluster boundaries, and continuous reconciliation behavior.
        The group enables safe delivery and reliable operations without owning payment business logic.

  functionalUnits:
    - id: FU-CHECKOUT
      name: Checkout Handling
      group: FG-PAYMENTS
      prose: |
        Checkout handling is the user-facing entrypoint where payment requests are initiated and normalized.
        It validates request shape, preserves transaction context, and returns clear customer feedback for each outcome.
        It delegates decision logic to payment authorization while protecting the user experience boundary.
    - id: FU-PAYMENT-AUTHORIZATION
      name: Payment Authorization
      group: FG-PAYMENTS
      prose: |
        Payment authorization orchestrates the final transaction decision path.
        It coordinates fraud scoring, external bank interactions, and escalation to support review when needed.
        The unit returns deterministic outcomes so downstream behavior remains consistent and testable.
    - id: FU-RISK-SCORING
      name: Risk Scoring
      group: FG-FRAUD
      prose: |
        Risk scoring computes and classifies transaction risk before approval decisions are finalized.
        It provides a stable scoring contract to authorization and supports audit context for later analysis.
        The unit is focused on decision quality, consistency, and policy-driven classification behavior.
    - id: FU-SUPPORT-REVIEW
      name: Support Review
      group: FG-FRAUD
      prose: |
        Support review handles manual decisions for escalated or ambiguous payment cases.
        It gives support operators context to approve, reject, or request additional verification in a controlled flow.
        The unit ensures manual intervention remains auditable, policy-constrained, and operationally reliable.
    - id: FU-CLUSTER-PROVISIONING
      name: Cluster Provisioning
      group: FG-PLATFORM
      tags: [day1]
      prose: |
        Cluster provisioning creates the runtime substrate used by all application workloads.
        It establishes cluster and namespace structure, baseline controls, and environment-level readiness.
        This unit is responsible for predictable, repeatable infrastructure foundations.
    - id: FU-GITOPS-OPERATIONS
      name: GitOps Operations
      group: FG-PLATFORM
      tags: [day2]
      prose: |
        GitOps operations continuously reconciles intended release state with actual runtime state.
        It governs rollout flow, drift correction, and operational delivery confidence across payment and fraud workloads.
        The unit provides safe and observable release behavior as an ongoing operational capability.

  actors:
    - id: ACT-CUSTOMER
      name: Customer
      description: Starts checkout and confirms payment.
    - id: ACT-SUPPORT
      name: Support Agent
      description: Reviews high-risk and declined-payment cases.
    - id: ACT-PLATFORM-OPERATOR
      name: Platform Operator
      description: Operates GitOps and platform lifecycle.

  attackVectors:
    - id: AV-MALICIOUS-API-REQUEST
      name: Malicious API Request
      description: Crafted payloads attempting to bypass authorization controls.
    - id: AV-FRAUDULENT-TRANSACTION-PATTERN
      name: Fraudulent Transaction Pattern
      description: Coordinated abuse pattern using synthetic identities, stolen instruments, and velocity anomalies to seek unauthorized approvals.
    - id: AV-REPLAYED-AUTH-CALLBACK
      name: Replayed Authorization Callback
      description: Replay attack against external authorization callback flow.
    - id: AV-COMPROMISED-DEPENDENCY
      name: Compromised Dependency
      description: Supply chain compromise in external SDK or image.

  referencedElements:
    - id: REF-BANK-GATEWAY-ENDPOINT
      kind: external_service_endpoint
      layer: runtime
      name: Bank Gateway Endpoint
    - id: REF-POSTGRES-DRIVER
      kind: third_party_library
      layer: code
      name: PostgreSQL Client Driver
    - id: REF-HELM-PLATFORM
      kind: platform_service
      layer: runtime
      name: Helm Runtime Platform

  interfaces:
    - id: IF-PAYMENTS-CHECKOUT-API
      name: Checkout API Interface
      protocol: https
      endpoint: /api/checkout
      schemaRef: schemas/checkout-request.json
      owner: FU-CHECKOUT
    - id: IF-PAYMENTS-BANK-AUTH
      name: Bank Authorization Interface
      protocol: https
      endpoint: /bank/authorize
      schemaRef: schemas/bank-auth.json
      owner: FU-PAYMENT-AUTHORIZATION
    - id: IF-PAYMENTS-RISK-SCORE-API
      name: Risk Score Interface
      protocol: https
      endpoint: /risk/score
      schemaRef: schemas/risk-score.json
      owner: FU-RISK-SCORING

  dataObjects:
    - id: DO-PAYMENTS-AUTH-REQUEST
      name: Authorization Request
      termRef: DATA-PAYMENT-REQUEST
      schemaRef: schemas/auth-request.json
      sensitivity: confidential
    - id: DO-PAYMENTS-AUTH-DECISION
      name: Authorization Decision
      termRef: DATA-AUTH-DECISION
      schemaRef: schemas/auth-decision.json
      sensitivity: internal
    - id: DO-PAYMENTS-RISK-SIGNAL
      name: Risk Signal
      schemaRef: schemas/risk-signal.json
      sensitivity: internal
    - id: DO-PAYMENTS-REVIEW-TICKET
      name: Manual Review Ticket
      schemaRef: schemas/review-ticket.json
      sensitivity: confidential

  deploymentTargets:
    - id: DEP-PAYMENTS-CLUSTER-PROD
      name: Payments Cluster Production
      environment: prod
      region: us-east-1
      account: shared-platform
      cluster: payments-prod
      namespace: payments
      trustZone: app
    - id: DEP-PAYMENTS-BANK-EDGE
      name: Bank Edge Integration Zone
      environment: prod
      region: us-east-1
      account: external
      cluster: bank-edge
      namespace: partner
      trustZone: external

  flows:
    - id: FLOW-CUSTOMER-CHECKOUT
      title: Customer Checkout Authorization Flow
      entry: [submit-payment]
      exits: [show-outcome]
      steps:
        - id: submit-payment
          kind: user_action
          ref: ACT-CUSTOMER
          action: Customer submits checkout payment form
          dataIn: [payment_method, billing_address, amount]
          next: [normalize-request]
        - id: normalize-request
          kind: system_action
          ref: FU-CHECKOUT
          action: Normalize and validate checkout payload
          dataOut: [normalized_payment_request]
          onError: [show-outcome]
          next: [authorize-payment]
        - id: authorize-payment
          kind: system_action
          ref: FU-PAYMENT-AUTHORIZATION
          action: Request fraud score and external authorization
          dataIn: [normalized_payment_request]
          dataOut: [authorization_decision]
          async: true
          onError: [show-outcome]
          next: [show-outcome]
        - id: show-outcome
          kind: system_action
          ref: FU-CHECKOUT
          action: Return approval or decline outcome to customer
          dataIn: [authorization_decision]
    - id: FLOW-PAYMENTS-MANUAL-REVIEW
      title: High-Risk Manual Review Flow
      entry: [detect-high-risk]
      exits: [complete-review]
      steps:
        - id: detect-high-risk
          kind: system_action
          ref: FU-RISK-SCORING
          action: Detect high-risk signal and emit escalation trigger
          dataOut: [risk_signal]
          next: [create-review-ticket]
        - id: create-review-ticket
          kind: system_action
          ref: FU-SUPPORT-REVIEW
          action: Create manual review ticket for support operations
          dataIn: [risk_signal]
          dataOut: [review_ticket]
          next: [complete-review]
        - id: complete-review
          kind: system_action
          ref: FU-PAYMENT-AUTHORIZATION
          action: Complete authorization using manual review outcome
          dataIn: [review_ticket]

  controls:
    - id: CTRL-PAYMENTS-SSO-MFA
      name: SSO MFA Enforcement
      category: identity-access
      description: Enforce MFA and conditional access for privileged operations.
    - id: CTRL-PAYMENTS-IMAGE-DIGEST
      name: Immutable Image Digests
      category: supply-chain
      description: Enforce immutable digest-pinned container image references.

  controlAllocations:
    - id: ALLOC-AC-2-IA-2-SSO
      controlRef: CTRL-PAYMENTS-SSO-MFA
      oscalControlIds: [ac-2, ia-2(1)]
      appliesTo: [FU-SUPPORT-REVIEW, FU-GITOPS-OPERATIONS]
      implementationType: technical
      status: implemented
      narrative: |
        Workforce access is mediated by centralized SSO with MFA and conditional access policy.
        Elevated operational actions require successful strong authentication before authorization.
      evidence:
        - path: infra/identity/sso-policy.yaml
          description: SSO policy with MFA and conditional access requirements.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]
    - id: ALLOC-CM-6-IMAGE-DIGEST
      controlRef: CTRL-PAYMENTS-IMAGE-DIGEST
      oscalControlIds: [cm-6]
      appliesTo: [FU-GITOPS-OPERATIONS, FU-CLUSTER-PROVISIONING]
      implementationType: hybrid
      status: implemented
      narrative: |
        Delivery pipelines and deployment manifests require immutable image digest pinning.
        Release automation rejects mutable tags in production deployment paths.
      evidence:
        - path: infra/flux/kustomization.yaml
          description: Flux deployment baseline references immutable release artifacts.
        - path: infra/helm/values-prod.yaml
          description: Production chart values pin immutable digest references.
      responsibleRoles: [ACT-PLATFORM-OPERATOR]

  trustBoundaries:
    - id: TB-PAYMENTS-EXTERNAL-BANK
      name: External Bank Boundary
      description: Separates internal payment authorization from external bank services.
    - id: TB-PAYMENTS-PLATFORM-CONTROL
      name: Platform Control Boundary
      description: Separates app workloads from platform control-plane authority.

  states:
    - id: STATE-PAYMENTS-CHECKOUT-RECEIVED
      name: Checkout Received
      description: Payment request accepted at checkout boundary.
    - id: STATE-PAYMENTS-AUTHORIZED
      name: Payment Authorized
      description: Authorization decision approved.

  events:
    - id: EVT-PAYMENTS-AUTH-REQUESTED
      name: Authorization Requested
      description: Request sent to authorization orchestration.
    - id: EVT-PAYMENTS-AUTH-COMPLETED
      name: Authorization Completed
      description: Authorization decision returned to checkout.

  risks:
    - id: RISK-PAYMENTS-SSO-MFA-GAP
      title: Privileged SSO path bypass risk
      statement: Privileged operational actions may bypass MFA if SSO policy enforcement drifts.
      status: mitigating
      likelihood: medium
      impact: high
      response: mitigate
      owner: ACT-PLATFORM-OPERATOR
      appliesTo: [FU-GITOPS-OPERATIONS, FU-SUPPORT-REVIEW]
      relatedControls: [CTRL-PAYMENTS-SSO-MFA]
      attackVectors: [AV-MALICIOUS-API-REQUEST]
      evidence:
        - path: infra/identity/sso-policy.yaml
          description: Active MFA policy configuration.
      residualRisk: medium
      rationale: Legacy operator account cleanup still in progress.

  poamItems:
    - id: POAM-PAYMENTS-SSO-LEGACY-CLEANUP
      riskRef: RISK-PAYMENTS-SSO-MFA-GAP
      milestone: Remove legacy non-federated operator accounts
      dueDate: 2026-06-30
      status: in-progress
      responsibleRole: ACT-PLATFORM-OPERATOR
      artifacts:
        - path: tickets/SEC-1423.md
          description: Migration and account cleanup tracking ticket.

  mappings:
    - type: contains
      from: FG-PAYMENTS
      to: FU-CHECKOUT
    - type: contains
      from: FG-PAYMENTS
      to: FU-PAYMENT-AUTHORIZATION
    - type: contains
      from: FG-FRAUD
      to: FU-RISK-SCORING
    - type: contains
      from: FG-FRAUD
      to: FU-SUPPORT-REVIEW
    - type: contains
      from: FG-PLATFORM
      to: FU-CLUSTER-PROVISIONING
    - type: contains
      from: FG-PLATFORM
      to: FU-GITOPS-OPERATIONS

    - type: interacts_with
      from: ACT-CUSTOMER
      to: FU-CHECKOUT
      description: Submits payment at checkout.
    - type: interacts_with
      from: ACT-SUPPORT
      to: FU-SUPPORT-REVIEW
      description: Performs manual payment reviews.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-GITOPS-OPERATIONS
      description: Operates delivery and release workflows.
    - type: interacts_with
      from: ACT-PLATFORM-OPERATOR
      to: FU-CLUSTER-PROVISIONING
      description: Maintains cluster baseline and environment setup.

    - type: depends_on
      from: FU-CHECKOUT
      to: FU-PAYMENT-AUTHORIZATION
      description: Delegates payment authorization.
    - type: calls
      from: FU-CHECKOUT
      to: IF-PAYMENTS-CHECKOUT-API
      description: Receives and validates checkout request payload.
    - type: writes
      from: FU-CHECKOUT
      to: DO-PAYMENTS-AUTH-REQUEST
      description: Persists normalized authorization request.
    - type: reads
      from: FU-CHECKOUT
      to: DO-PAYMENTS-AUTH-DECISION
      description: Reads final authorization decision for user-facing response.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: FU-RISK-SCORING
      description: Requests fraud scoring before final authorization.
    - type: calls
      from: FU-PAYMENT-AUTHORIZATION
      to: IF-PAYMENTS-RISK-SCORE-API
      description: Calls risk scoring interface for fraud decision support.
    - type: calls
      from: FU-PAYMENT-AUTHORIZATION
      to: IF-PAYMENTS-BANK-AUTH
      description: Calls external bank authorization interface.
    - type: reads
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-AUTH-REQUEST
      description: Reads normalized request for authorization pipeline.
    - type: writes
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-AUTH-DECISION
      description: Persists final authorization decision.
    - type: writes
      from: FU-RISK-SCORING
      to: DO-PAYMENTS-RISK-SIGNAL
      description: Persists computed risk signal.
    - type: reads
      from: FU-RISK-SCORING
      to: DO-PAYMENTS-AUTH-REQUEST
      description: Reads normalized request to compute risk signal.
    - type: reads
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-RISK-SIGNAL
      description: Reads risk signal before final authorization decision.
    - type: publishes
      from: FU-RISK-SCORING
      to: DO-PAYMENTS-RISK-SIGNAL
      description: Publishes risk signal updates for downstream consumers.
    - type: subscribes
      from: FU-SUPPORT-REVIEW
      to: DO-PAYMENTS-RISK-SIGNAL
      description: Subscribes to high-risk signal updates.
    - type: writes
      from: FU-SUPPORT-REVIEW
      to: DO-PAYMENTS-REVIEW-TICKET
      description: Persists manual review ticket records.
    - type: reads
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-REVIEW-TICKET
      description: Reads manual review outcome before returning decision.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: REF-BANK-GATEWAY-ENDPOINT
      description: Calls external bank authorization endpoint.
    - type: depends_on
      from: FU-PAYMENT-AUTHORIZATION
      to: FU-SUPPORT-REVIEW
      description: Escalates high-risk payments for manual review.
    - type: depends_on
      from: FU-RISK-SCORING
      to: REF-POSTGRES-DRIVER
      description: Uses external library for audit persistence.
    - type: depends_on
      from: FU-GITOPS-OPERATIONS
      to: FU-CLUSTER-PROVISIONING
      description: Relies on provisioned cluster and namespace baseline.
    - type: depends_on
      from: FU-GITOPS-OPERATIONS
      to: REF-HELM-PLATFORM
      description: Uses Helm runtime platform for release orchestration.
    - type: deployed_to
      from: FU-CHECKOUT
      to: DEP-PAYMENTS-CLUSTER-PROD
      description: Checkout workload deployment target.
    - type: deployed_to
      from: FU-PAYMENT-AUTHORIZATION
      to: DEP-PAYMENTS-CLUSTER-PROD
      description: Authorization workload deployment target.
    - type: deployed_to
      from: IF-PAYMENTS-BANK-AUTH
      to: DEP-PAYMENTS-BANK-EDGE
      description: External authorization interface boundary target.
    - type: bounded_by
      from: FU-PAYMENT-AUTHORIZATION
      to: TB-PAYMENTS-EXTERNAL-BANK
      description: Authorization crosses external bank trust boundary.
    - type: bounded_by
      from: FU-GITOPS-OPERATIONS
      to: TB-PAYMENTS-PLATFORM-CONTROL
      description: GitOps control-plane boundaries.

    - type: targets
      from: AV-MALICIOUS-API-REQUEST
      to: FU-CHECKOUT
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-RISK-SCORING
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-PAYMENT-AUTHORIZATION
    - type: targets
      from: AV-FRAUDULENT-TRANSACTION-PATTERN
      to: FU-SUPPORT-REVIEW
    - type: targets
      from: AV-REPLAYED-AUTH-CALLBACK
      to: FU-PAYMENT-AUTHORIZATION
    - type: targets
      from: AV-COMPROMISED-DEPENDENCY
      to: REF-POSTGRES-DRIVER
    - type: mitigated_by
      from: AV-MALICIOUS-API-REQUEST
      to: CTRL-PAYMENTS-SSO-MFA
    - type: mitigated_by
      from: AV-COMPROMISED-DEPENDENCY
      to: CTRL-PAYMENTS-IMAGE-DIGEST

    - type: contains
      from: FU-CHECKOUT
      to: IF-PAYMENTS-CHECKOUT-API
    - type: contains
      from: FU-PAYMENT-AUTHORIZATION
      to: IF-PAYMENTS-BANK-AUTH
    - type: contains
      from: FU-RISK-SCORING
      to: IF-PAYMENTS-RISK-SCORE-API
    - type: contains
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-AUTH-REQUEST
    - type: contains
      from: FU-PAYMENT-AUTHORIZATION
      to: DO-PAYMENTS-AUTH-DECISION
    - type: contains
      from: FU-RISK-SCORING
      to: DO-PAYMENTS-RISK-SIGNAL
    - type: contains
      from: FU-SUPPORT-REVIEW
      to: DO-PAYMENTS-REVIEW-TICKET

    - type: transitions_to
      from: STATE-PAYMENTS-CHECKOUT-RECEIVED
      to: STATE-PAYMENTS-AUTHORIZED
      description: Checkout transitions to authorized state after policy and bank decision.
    - type: triggered_by
      from: STATE-PAYMENTS-CHECKOUT-RECEIVED
      to: EVT-PAYMENTS-AUTH-REQUESTED
      description: Authorization flow start trigger.
    - type: triggered_by
      from: STATE-PAYMENTS-AUTHORIZED
      to: EVT-PAYMENTS-AUTH-COMPLETED
      description: Completion event for authorization flow.
    - type: guarded_by
      from: STATE-PAYMENTS-AUTHORIZED
      to: CTRL-PAYMENTS-SSO-MFA
      description: Authorized-state operations require strong access controls.
    - type: guarded_by
      from: STATE-PAYMENTS-AUTHORIZED
      to: TB-PAYMENTS-EXTERNAL-BANK
      description: Boundary guard for external bank interaction.

inferenceHints:
  runtimeSources:
    - ./infra/terraform
    - ./infra/flux
    - ./infra/helm
  codeSources:
    - ./src
  expectedRuntimeKinds:
    - cluster
    - namespace
    - workload
  ownershipResolutionOrder:
    - explicit_annotation
    - path_convention
    - unresolved_warning

views:
  - id: VIEW-ARCHITECTURE-INTENT
    kind: architecture-intent
    roots: [FG-PAYMENTS, FG-FRAUD, FG-PLATFORM]
    authoredStatus: stable
    authoredStatusExplanation: Stable authored capability boundaries and ownership split; changes are intentional and infrequent.
  - id: VIEW-COMMUNICATION
    kind: communication
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-SUPPORT-REVIEW]
    authoredStatus: in-review
    authoredStatusExplanation: Communication semantics are partially inferred and still being refined with explicit protocol and interaction metadata.
  - id: VIEW-DEPLOYMENT
    kind: deployment
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-GITOPS-OPERATIONS]
    authoredStatus: in-review
    authoredStatusExplanation: Deployment chain and control-plane mapping are mostly present, but ownership evidence remains incomplete for some units.
  - id: VIEW-SECURITY
    kind: security
    roots: [FG-PAYMENTS, FG-FRAUD, FG-PLATFORM, AV-MALICIOUS-API-REQUEST, AV-FRAUDULENT-TRANSACTION-PATTERN, AV-REPLAYED-AUTH-CALLBACK, AV-COMPROMISED-DEPENDENCY]
    authoredStatus: draft
    authoredStatusExplanation: Threat mapping is present for key vectors, but control expectations and coverage breadth are still evolving.
  - id: VIEW-TRACEABILITY
    kind: traceability
    roots: [FU-CHECKOUT, FU-PAYMENT-AUTHORIZATION, FU-RISK-SCORING, FU-SUPPORT-REVIEW, FU-CLUSTER-PROVISIONING, FU-GITOPS-OPERATIONS]
    authoredStatus: in-review
    authoredStatusExplanation: Requirement-to-unit linkage is present; cross-layer ownership consistency still needs tightening.
  - id: VIEW-INTERACTION-FLOW
    kind: interaction-flow
    roots: [FLOW-CUSTOMER-CHECKOUT, FLOW-PAYMENTS-MANUAL-REVIEW]
    includeKinds: [flow, flow_step, actor, functional_unit, interface, data_object]
    includeMappings: [flow_next, flow_error, flow_async, flow_ref, contains, calls, reads, writes, publishes, subscribes, streams]
    authoredStatus: in-review
    authoredStatusExplanation: Flow is authored for core checkout path and used to align UX/data movement semantics with architecture behavior.
  - id: VIEW-STATE-LIFECYCLE
    kind: state-lifecycle
    roots: [STATE-PAYMENTS-CHECKOUT-RECEIVED]
    includeKinds: [state, event, control, trust_boundary]
    includeMappings: [transitions_to, triggered_by, guarded_by]
    authoredStatus: in-review
    authoredStatusExplanation: Lifecycle transitions and controls are explicitly modeled for payment decision progression.
