apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: risk-scorer
  namespace: risk
  annotations:
    engmodel.dev/owner-unit: FU-RISK-SCORING
    engmodel.dev/runtime-description: computes fraud risk score signals and persists evidence used by authorization decisions
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infra/helm/risk-scorer
      sourceRef:
        kind: GitRepository
        name: payments-sample-source
      interval: 1m
  values:
    image:
      repository: ghcr.io/example/risk-scorer
      tag: v0.1.0
    service:
      port: 8082
