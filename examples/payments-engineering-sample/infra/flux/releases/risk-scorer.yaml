apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: risk-scorer
  namespace: risk
  annotations:
    trace.dev/managed-by: payments-apps
    trace.dev/part-of: CONT-RISK-SCORER
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infra/helm/risk-scorer
      sourceRef:
        kind: GitRepository
        name: payments-sample-source
      interval: 1m
  values:
    image:
      repository: ghcr.io/example/risk-scorer
      tag: v0.1.0
    service:
      port: 8082
