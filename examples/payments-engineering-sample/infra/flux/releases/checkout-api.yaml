apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkout-api
  namespace: payments
  annotations:
    engmodel.dev/owner-unit: FU-CHECKOUT
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infra/helm/checkout-api
      sourceRef:
        kind: GitRepository
        name: payments-sample-source
      interval: 1m
  values:
    image:
      repository: ghcr.io/example/checkout-api
      tag: v0.1.0
    service:
      port: 8080
