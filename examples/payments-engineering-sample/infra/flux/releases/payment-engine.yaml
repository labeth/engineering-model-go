apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: payment-engine
  namespace: payments
  annotations:
    trace.dev/managed-by: payments-apps
    trace.dev/part-of: CONT-PAYMENT-ENGINE
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infra/helm/payment-engine
      sourceRef:
        kind: GitRepository
        name: payments-sample-source
      interval: 1m
  values:
    image:
      repository: ghcr.io/example/payment-engine
      tag: v0.1.0
    service:
      port: 8081
