apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: payment-engine
  namespace: payments
  annotations:
    engmodel.dev/owner-unit: FU-PAYMENT-AUTHORIZATION
    engmodel.dev/runtime-description: executes payment authorization decisions and coordinates fraud checks plus bank callbacks
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infra/helm/payment-engine
      sourceRef:
        kind: GitRepository
        name: payments-sample-source
      interval: 1m
  values:
    image:
      repository: ghcr.io/example/payment-engine
      tag: v0.1.0
    service:
      port: 8081
