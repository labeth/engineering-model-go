apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-engine
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: payment-engine
  template:
    metadata:
      labels:
        app: payment-engine
    spec:
      containers:
        - name: payment-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
